<!DOCTYPE html>
<html>
<head>
<script type="module">
import { turkeyMapPaths } from "./turkeyMapPaths.js";
document.addEventListener("DOMContentLoaded", () => {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 1000 500");
    document.body.appendChild(svg);
    const results = [];
    for(const item of turkeyMapPaths) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", item.draw);
        svg.appendChild(path);
        const bbox = path.getBBox();
        const cx = bbox.x + bbox.width/2;
        const cy = bbox.y + bbox.height/2;
        results.push({ plate: item.plate, x: Math.round(cx), y: Math.round(cy), city: item.city });
    }
    document.body.innerHTML = "<pre>" + JSON.stringify(results, null, 2) + "</pre>";
});
</script>
</head>
<body></body>
</html>
