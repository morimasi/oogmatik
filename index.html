<script>

            zinc: {
                50: '#fafafa',

<style>
  @keyframes logo-glow {
    0%, 100% {
      filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.4)); /* Faint indigo glow */
    }
    50% {
      filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6)); /* Stronger violet glow */
    }
  }

  @keyframes fade-b-d {
    0%, 40% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes fade-d-b {
    0%, 50% { opacity: 0; }
    60%, 90% { opacity: 1; }
    100% { opacity: 0; }
  }

  .animated-logo {
    animation: logo-glow 5s ease-in-out infinite;
  }
  
  #stem-b {
    animation: fade-b-d 5s infinite ease-in-out;
  }
  
  #stem-d {
    animation: fade-d-b 5s infinite ease-in-out;
  }


  @media print {
    @page {
      size: A4;
      margin: 20mm;
    }
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Hide everything by default */
    body * {
      visibility: hidden;
    }
    /* Only show the printable area and its children */
    .printable-area, .printable-area * {
      visibility: visible;
    }
    /* Position the printable area to take up the whole page */
    .printable-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      margin: 0;
      padding: 0;
    }
    .worksheet-page {
      page-break-after: always;
    }
    .worksheet-page:last-child {
      page-break-after: auto;
    }
  }
</style>
