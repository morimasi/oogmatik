<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Print Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Regular.otf');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Bold.otf');
        font-weight: bold;
        font-style: normal;
      }

      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f4f4f5;
        --bg-paper: #ffffff;
        --bg-inset: #f4f4f5;
        --text-primary: #18181b;
        --text-secondary: #71717a;
        --text-muted: #a1a1aa;
        --border-color: #e4e4e7;
        --accent-color: #4f46e5;
        --accent-hover: #4338ca;
        --pattern-color: #e4e4e7;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
      }

      /* Dark Theme Variables */
      .dark {
        --bg-primary: #18181b;
        --bg-secondary: #27272a;
        --bg-paper: #27272a;
        --bg-inset: #18181b;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #52525b;
        --border-color: #3f3f46;
        --accent-color: #818cf8;
        --accent-hover: #6366f1;
        --pattern-color: #27272a;
      }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll, handle in app */
      }

      /* Image Saturation Filter */
      img, svg {
        filter: saturate(var(--ui-saturation));
      }

      /* Print Specific Styles */
      @media print {
        @page {
          margin: 0;
        }
        body {
          background: white;
          color: black;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          overflow: visible;
        }
        .no-print, header, aside, .tour-overlay {
          display: none !important;
        }
        .printable-area {
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
        }
        /* Ensure background colors and images are printed */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: var(--border-color);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: var(--text-muted);
      }
    </style>
  <script type="importmap">
{

  }
}
