
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/otf/OpenDyslexic-Regular.otf');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/otf/OpenDyslexic-Bold.otf');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/otf/OpenDyslexic-Italic.otf');
        font-weight: normal;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/otf/OpenDyslexic-BoldItalic.otf');
        font-weight: bold;
        font-style: italic;
        font-display: swap;
      }

      :root {
        /* Default Theme (Anthracite Base) */
        --bg-primary: #222226;
        --bg-secondary: #1a1a1d;
        --bg-paper: #2d2d32;
        --bg-inset: #18181b;
        
        --panel-bg: rgba(45, 45, 50, 0.95);

        --text-primary: #fefce8;    
        --text-secondary: #d4d4d8;  
        --text-muted: #a1a1aa;      
        
        --border-color: #3f3f46;    
        
        --accent-color: #fbbf24;    /* Default Gold */
        --accent-hover: #f59e0b;    
        --pattern-color: #3f3f46;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
        --pattern-image: none;
      }

      /* --- THEME OVERRIDES --- */
      /* Light Theme */
      :root.theme-light {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --bg-paper: #ffffff;
        --bg-inset: #f1f5f9;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --accent-color: #4f46e5; /* Indigo */
        --accent-hover: #4338ca;
        --pattern-color: #e2e8f0;
      }

      /* Standard Dark Theme (Zinc) */
      :root.dark {
        --bg-primary: #18181b;
        --bg-secondary: #09090b;
        --bg-paper: #27272a;
        --bg-inset: #09090b;
        --panel-bg: rgba(39, 39, 42, 0.95);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border-color: #3f3f46;
        --accent-color: #818cf8; /* Indigo-400 */
        --accent-hover: #6366f1;
        --pattern-color: #27272a;
      }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-primary);
        background-image: var(--pattern-image);
        background-size: 550px 550px;
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; 
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-inset); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* Worksheet Texture & Edit Guides */
      .worksheet-texture {
          background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 1.4l2.83 2.83 1.41-1.41L1.41 0H0v1.41zM38.59 40l-2.83-2.83 1.41-1.41L40 38.59V40h-1.41zM40 1.41l-2.83 2.83-1.41-1.41L38.59 0H40v1.41zM20 18.6l2.83-2.83 1.41 1.41L21.41 20l2.83 2.83-1.41 1.41L20 21.41l-2.83 2.83-1.41-1.41L18.59 20l-2.83-2.83 1.41-1.41L20 18.59z'/%3E%3C/g%3E%3C/svg%3E");
      }
      
      .edit-grid-overlay {
          background-size: 20px 20px;
          background-image: 
              linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
          pointer-events: none;
      }

      .edit-safety-guide {
          border: 1px dashed rgba(239, 68, 68, 0.3); /* Red-400 equivalent */
          pointer-events: none;
      }

    /* Smart Column Utilities for Screen */
    .smart-grid {
        display: block; 
        gap: 1.5rem;
    }
    .columns-1 { column-count: 1; }
    .columns-2 { column-count: 2; column-gap: 2rem; }
    .columns-3 { column-count: 3; column-gap: 2rem; }
    .columns-4 { column-count: 4; column-gap: 1rem; }
    
    .smart-grid > * {
        break-inside: avoid;
        page-break-inside: avoid;
        margin-bottom: 1.5rem;
        display: inline-block; 
        width: 100%;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); }

    /* --- PAGE CONTAINER STYLES --- */
    .document-viewport {
        /* Background will be set by JS/React based on theme, but default to transparent to show body bg */
        background-color: transparent; 
        perspective: 1000px;
    }
    
    /* A4 Page Style */
    .worksheet-page {
        background-color: white;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        margin: 0 auto; /* Center horizontally */
        margin-bottom: 40px; /* Space between pages */
        width: 210mm;
        min-height: 297mm;
        padding: 0;
        position: relative;
        overflow: hidden;
    }

    /* --- YAZDIRMA (PRINT) STİLLERİ --- */
    @media print {
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: white !important;
            color: black !important;
            width: 100%;
            height: 100%;
            overflow: visible !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Ana uygulamayı gizle */
        #root, .no-print, body > *:not(#printable-area) {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        /* Yazdırma alanını göster */
        #printable-area {
            display: block !important;
            position: absolute !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            height: auto !important;
            z-index: 9999 !important;
            background: white !important;
        }

        /* Her worksheet-item yeni bir sayfa olmalı */
        .worksheet-page {
            display: block !important;
            break-after: page !important;
            page-break-after: always !important;
            width: 210mm !important;
            height: 297mm !important;
            margin: 0 !important;
            padding: 0 !important;
            position: relative !important;
            box-shadow: none !important;
            border: none !important;
            overflow: hidden !important; 
            transform: none !important; 
        }
        
        /* Scaler'ı sıfırla */
        .worksheet-scaler {
            transform: none !important;
            width: 100% !important;
            zoom: 1 !important;
        }

        /* HIDE UI ELEMENTS */
        .edit-handle, .edit-grid-overlay, .edit-safety-guide, button, .no-print, .page-navigator {
            display: none !important;
        }
        
        /* INPUT VISIBILITY */
        input, textarea, select {
            border: 1px solid #000 !important;
            color: #000 !important;
            background: transparent !important;
            appearance: none;
        }
    }
    </style>

  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
