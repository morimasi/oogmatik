<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oogmatik | Ultra Creative Studio</title>
  <meta name="description" content="Nöro-mimari ve özel eğitim için derinlikli materyal üretim merkezi." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Global Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --bg-primary: #222226;
      --bg-secondary: #1a1a1d;
      --bg-paper: #2d2d32;
      --bg-inset: #18181b;
      --panel-bg: rgba(45, 45, 50, 0.95);
      --text-primary: #fefce8;
      --text-secondary: #d4d4d8;
      --text-muted: #a1a1aa;
      --border-color: #3f3f46;
      --accent-color: #fbbf24;
      --accent-hover: #f59e0b;
      --pattern-color: #3f3f46;
      --ui-font: 'Lexend', 'OpenDyslexic', sans-serif;
      --ui-scale: 1;
      --ui-spacing: normal;
      --ui-line-height: 1.6;
      --ui-saturation: 100%;
      --pattern-image: none;
    }

    :root.theme-light {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-paper: #ffffff;
      --bg-inset: #f1f5f9;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --accent-color: #4f46e5;
      --accent-hover: #4338ca;
      --pattern-color: #e2e8f0;
    }

    :root.dark {
      --bg-primary: #18181b;
      --bg-secondary: #09090b;
      --bg-paper: #27272a;
      --bg-inset: #09090b;
      --panel-bg: rgba(39, 39, 42, 0.95);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-color: #3f3f46;
      --accent-color: #818cf8;
      --accent-hover: #6366f1;
      --pattern-color: #27272a;
    }

    body {
      font-family: var(--ui-font);
      font-size: calc(16px * var(--ui-scale));
      letter-spacing: var(--ui-spacing);
      line-height: var(--ui-line-height);
      background-color: var(--bg-primary);
      background-image: var(--pattern-image);
      background-size: 550px 550px;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* --- DYNAMIC WORKSHEET STRUCTURE --- */
    .worksheet-page {
      background-color: white;
      color: black;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      margin: 0 auto;
      width: 210mm;
      min-height: 297mm;
      padding: 6mm;
      position: relative;
      overflow: visible !important;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .break-inside-avoid {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* --- ULTRA PROFESSIONAL PRINT ENGINE V3 — A4 KOMPAKT SİSTEM --- */
    @media print {
      @page {
        size: A4 portrait;
        margin: 0mm !important;
      }

      html,
      body {
        visibility: hidden;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
      }

      #print-container {
        visibility: visible !important;
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        margin: 0 !important;
        background: white !important;
        z-index: 9999999 !important;
      }

      /* ═══════════════════════════════════════════
         SAYFA KONTEYNER — A4 Piksel Mühendisliği
         A4 = 210mm x 297mm @ 96dpi = 794px x 1123px
         Kullanılabilir alan: -12mm*2 padding = 272.8mm ≈ 1031px
      ═══════════════════════════════════════════ */
      .ultra-print-page,
      .worksheet-page {
        visibility: visible !important;
        display: flex !important;
        flex-direction: column !important;
        width: 210mm !important;
        height: 296.8mm !important;
        /* SABİT A4 BOYUTU */
        padding: 12mm 15mm !important;
        margin: 0 auto !important;
        overflow: hidden !important;
        /* Sayfa dışına taşanlar kesilir (pagination ile çözülecek) */
        page-break-after: always !important;
        break-after: page !important;
        box-sizing: border-box !important;
        background: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        position: relative !important;
      }

      /* ═══════════════════════════════════════════
         İÇERİK ALANI — Kompakt + Yoğun
      ═══════════════════════════════════════════ */
      .print-content-area {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 8px !important;
        width: 100% !important;
        overflow: hidden !important;
      }

      /* Blokların sayfa ortasında kesilmesini önle */
      .block-container,
      .pedagogical-header,
      .block-table-container,
      .block-grid-container {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* 2 sütunlu grid ise gap küçült */
      .print-content-area.grid {
        gap: 4px !important;
      }

      /* ═══════════════════════════════════════════
         PEDAGOJİK HEADER — Kompakt
      ═══════════════════════════════════════════ */
      .pedagogical-header {
        margin-bottom: 6px !important;
        padding-bottom: 4px !important;
        border-bottom-width: 2px !important;
      }

      .pedagogical-header h3 {
        font-size: 15px !important;
        line-height: 1.2 !important;
        margin-bottom: 2px !important;
      }

      .pedagogical-header p.instruction {
        font-size: 9px !important;
        line-height: 1.3 !important;
        margin: 0 !important;
      }

      .pedagogical-header p.note {
        font-size: 8px !important;
        margin-top: 2px !important;
        line-height: 1.2 !important;
      }

      /* ═══════════════════════════════════════════
         BLOK TİPİ BAZLI KOMPAKT KURALLAR
      ═══════════════════════════════════════════ */

      /* --- HEADER BLOK --- */
      .block-header {
        font-size: 14px !important;
        padding-bottom: 3px !important;
        margin-bottom: 4px !important;
        border-bottom-width: 2px !important;
      }

      /* --- TEXT BLOK --- */
      .block-text {
        font-size: 10px !important;
        line-height: 1.5 !important;
        margin-bottom: 4px !important;
        padding: 0 !important;
      }

      /* --- GRID BLOK --- */
      .block-grid-container {
        margin-bottom: 4px !important;
        padding: 4px !important;
        border-width: 2px !important;
        border-radius: 8px !important;
        gap: 2px !important;
      }

      .block-grid-cell {
        width: 26px !important;
        height: 26px !important;
        font-size: 12px !important;
        border-width: 1px !important;
        border-radius: 3px !important;
      }

      /* --- TABLE BLOK --- */
      .block-table-container {
        margin-bottom: 4px !important;
        border-width: 2px !important;
        border-radius: 6px !important;
      }

      .block-table-container table th {
        padding: 3px 5px !important;
        font-size: 8px !important;
      }

      .block-table-container table td {
        padding: 2px 5px !important;
        font-size: 9px !important;
      }

      /* --- CLOZE TEST BLOK --- */
      .block-cloze {
        padding: 5px 8px !important;
        font-size: 10px !important;
        line-height: 2.0 !important;
        margin-bottom: 4px !important;
        border-width: 1px !important;
        border-radius: 8px !important;
        border-style: dashed !important;
      }

      .block-cloze .cloze-blank {
        min-width: 60px !important;
        margin: 0 2px !important;
      }

      .block-cloze .cloze-label {
        font-size: 6px !important;
      }

      /* --- CATEGORICAL SORTING BLOK --- */
      .block-categorical {
        margin-bottom: 4px !important;
        gap: 3px !important;
      }

      .block-cat-header {
        padding: 3px 5px !important;
        font-size: 8px !important;
        border-radius: 6px !important;
      }

      .block-cat-body {
        min-height: 60px !important;
        padding: 3px !important;
        border-radius: 6px !important;
        gap: 2px !important;
      }

      .block-cat-item {
        padding: 2px 5px !important;
        font-size: 8px !important;
        border-radius: 4px !important;
      }

      .block-cat-bank {
        padding: 4px !important;
        margin-bottom: 3px !important;
        gap: 2px !important;
      }

      /* --- MATCH COLUMNS BLOK --- */
      .block-match {
        padding: 5px !important;
        margin-bottom: 4px !important;
        border-radius: 8px !important;
        gap: 4px !important;
      }

      .block-match-label {
        font-size: 7px !important;
        margin-bottom: 1px !important;
      }

      .block-match-item {
        padding: 3px 6px !important;
        font-size: 9px !important;
        border-radius: 5px !important;
        gap: 3px !important;
      }

      .block-match-circled {
        font-size: 10px !important;
      }

      /* --- LOGIC CARD BLOK --- */
      .block-logic-card {
        padding: 5px !important;
        margin-bottom: 4px !important;
        border-radius: 8px !important;
        border-width: 2px !important;
        gap: 3px !important;
      }

      .block-logic-card .logic-text-box {
        padding: 3px 6px !important;
        font-size: 9px !important;
        border-radius: 6px !important;
        margin-bottom: 2px !important;
      }

      .block-logic-card .logic-option-btn {
        width: 28px !important;
        height: 28px !important;
        font-size: 10px !important;
        border-radius: 5px !important;
        border-width: 1px !important;
      }

      /* --- VISUAL CLUE CARD BLOK --- */
      .block-clue-card {
        padding: 5px 8px !important;
        margin-bottom: 4px !important;
        border-radius: 8px !important;
        border-left-width: 4px !important;
        gap: 6px !important;
      }

      .block-clue-card .clue-icon {
        width: 28px !important;
        height: 28px !important;
        font-size: 12px !important;
        border-radius: 6px !important;
        flex-shrink: 0 !important;
      }

      .block-clue-card h5 {
        font-size: 7px !important;
        margin-bottom: 1px !important;
      }

      .block-clue-card p {
        font-size: 9px !important;
        line-height: 1.3 !important;
      }

      /* --- NEURO MARKER BLOK --- */
      .block-neuro {
        margin: 3px 0 !important;
      }

      .block-neuro .neuro-dot {
        width: 5px !important;
        height: 5px !important;
      }

      /* --- SVG SHAPE BLOK --- */
      .block-svg-shape {
        margin-bottom: 4px !important;
      }

      .block-svg-shape .svg-container {
        width: 56px !important;
        height: 56px !important;
        padding: 3px !important;
        border-radius: 6px !important;
        border-width: 1px !important;
      }

      /* --- FOOTER VALIDATION BLOK --- */
      .block-footer-val {
        padding: 6px 10px !important;
        margin-top: 4px !important;
        border-radius: 10px !important;
        border-width: 2px !important;
        gap: 4px !important;
      }

      .block-footer-val h4 {
        font-size: 10px !important;
        margin-bottom: 1px !important;
      }

      .block-footer-val p {
        font-size: 8px !important;
      }

      .block-footer-val .target-value {
        font-size: 18px !important;
      }

      /* ═══════════════════════════════════════════
         GENEL KOMPAKT OVERRIDES
      ═══════════════════════════════════════════ */

      /* Tüm mb-* değerlerini sıfırla */
      .worksheet-page [class*="mb-"] {
        margin-bottom: 3px !important;
      }

      /* Tüm mt-* değerlerini sıfırla */
      .worksheet-page [class*="mt-"] {
        margin-top: 2px !important;
      }

      /* padding kompakt */
      .worksheet-page [class*="p-8"],
      .worksheet-page [class*="p-10"] {
        padding: 5px !important;
      }

      .worksheet-page [class*="p-6"] {
        padding: 4px !important;
      }

      .worksheet-page [class*="p-4"] {
        padding: 3px !important;
      }

      /* Yuvarlak köşeleri küçült */
      .worksheet-page [class*="rounded-["] {
        border-radius: 8px !important;
      }

      .worksheet-page [class*="rounded-[2"] {
        border-radius: 6px !important;
      }

      .worksheet-page [class*="rounded-[3"] {
        border-radius: 8px !important;
      }

      .worksheet-page [class*="rounded-[4"] {
        border-radius: 10px !important;
      }

      /* shadow kaldır (print'te gereksiz) */
      .worksheet-page [class*="shadow"] {
        box-shadow: none !important;
      }

      /* gap küçült */
      .worksheet-page [class*="gap-6"],
      .worksheet-page [class*="gap-8"],
      .worksheet-page [class*="gap-12"] {
        gap: 4px !important;
      }

      .worksheet-page [class*="gap-4"] {
        gap: 3px !important;
      }

      /* min-h sıfırla */
      .worksheet-page [class*="min-h-[200px]"] {
        min-height: 50px !important;
      }

      .worksheet-page [class*="min-h-[120px]"] {
        min-height: 40px !important;
      }

      /* ═══════════════════════════════════════════
         GİZLE / GÖSTER
      ═══════════════════════════════════════════ */
      .no-print,
      .edit-handle,
      button,
      .ui-panel,
      [class*="animate-"],
      [class*="hover:"],
      [class*="blur-"],
      [class*="backdrop-"] {
        display: none !important;
      }

      /* edit overlay gizle */
      [contenteditable="true"] {
        outline: none !important;
        border: none !important;
        cursor: default !important;
      }

      /* ═══════════════════════════════════════════
         SAYFA ALT BİLGİSİ
      ═══════════════════════════════════════════ */
      .print-footer {
        position: absolute !important;
        bottom: 6mm !important;
        left: 12mm !important;
        right: 12mm !important;
        display: flex !important;
        justify-content: space-between !important;
        font-size: 7px !important;
        font-weight: bold !important;
        color: #a1a1aa !important;
        border-top: 0.5px solid #e4e4e7 !important;
        padding-top: 1.5mm !important;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "vite": "https://aistudiocdn.com/vite@^7.2.6",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
        "@vercel/node": "https://aistudiocdn.com/@vercel/node@^5.5.14",
        "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
        "jspdf": "https://aistudiocdn.com/jspdf@^3.0.4",
        "pdfjs-dist": "https://esm.sh/pdfjs-dist@^5.4.449"
      }
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
