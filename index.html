
<!DOCTYPE html>

    <title>Bursa Disleksi Ai</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- OpenDyslexic Font -->
    <link href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic.min.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['OpenDyslexic', 'sans-serif'],
          mono: ['OpenDyslexic', 'sans-serif'],
        },
        colors: {
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',

                600: '#52525b',

<style>
  /* Force OpenDyslexic on all elements including form inputs */
  body, button, input, select, textarea, table, th, td, a, li, ul, ol, div, span, p, h1, h2, h3, h4, h5, h6, label, pre, code {
    font-family: 'OpenDyslexic', sans-serif !important;
  }

  /* --- DYNAMIC LAYOUT RULES FOR WORKSHEET CONTENT --- */
  /* Apply user-selected gap to all grid and flex containers inside the worksheet page */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); } /* Ters dön */
    45% { transform: rotateY(180deg); } /* Ters bekle */
    60% { transform: rotateY(360deg); } /* Düz dön */
    100% { transform: rotateY(360deg); } /* Düz bekle */
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }

  /* --- PROFESSIONAL PRINT CSS (A4 PIXEL PERFECT) --- */
  @media print {
    @page {
      size: A4 portrait;
      margin: 10mm; /* Safe margin for printers, maximizing space but safe for cutting */
    }
    
    html, body {
      width: 100%;
      height: auto !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: white !important;
      color: black !important;
      overflow: visible !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Reset Layout Containers */
    #root, .h-screen, .flex, .flex-col, .flex-1, .overflow-hidden, .overflow-y-auto, main {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        position: static !important;
    }

    /* Hide UI Elements */
    header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar {
      display: none !important;
    }
    
    /* Printable Area */
    .printable-area {
      position: static !important;
      width: 100% !important;
      height: auto !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: visible !important;
      display: block !important;
    }

    .page-grid {
      display: block !important;
      width: 100% !important;
      height: auto !important;
    }

    /* Compact Worksheet Page for Print */
    .worksheet-page {
      position: relative !important;
      width: 100% !important;
      max-width: 100% !important;
      min-height: auto !important; /* Don't force full height */
      height: auto !important;
      margin: 0 !important; /* Remove margins to use @page margin */
      padding: 0 !important; /* Override inline React padding */
      
      page-break-after: always !important;
      break-after: page !important;
      
      border: none !important;
      box-shadow: none !important;
      background-color: white !important;
      color: black !important;
      overflow: visible !important;
      display: block !important;
    }
    
    .worksheet-page:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
    }

    .zoom-wrapper {
      transform: none !important;
      width: 100% !important;
      height: auto !important;
      overflow: visible !important;
    }
    
    .zoom-wrapper > div {
        height: auto !important;
    }

    /* --- COMPACT SPACING FOR PRINT --- */
    /* Significantly reduce padding and gaps to fit more content */
    .worksheet-page .p-4, .worksheet-page .p-5, .worksheet-page .p-6, .worksheet-page .p-8 {
        padding: 0.5rem !important;
    }
    
    .worksheet-page .gap-4, .worksheet-page .gap-6, .worksheet-page .gap-8 { 
        gap: 0.5rem !important; 
    }
    
    .worksheet-page .space-y-4 > * + *,
    .worksheet-page .space-y-6 > * + *,
    .worksheet-page .space-y-8 > * + * { 
        margin-top: 0.5rem !important; 
    }
    
    /* Headers and Titles - Compact */
    .pedagogical-header { margin-bottom: 0.5rem !important; }
    h3 { font-size: 1.25rem !important; margin-bottom: 0.25rem !important; }
    p { font-size: 1rem !important; margin-bottom: 0.25rem !important; }

    /* --- PAGE BREAK CONTROL --- */
    /* Allow breaking inside large containers (like story boxes) */
    .worksheet-page .rounded-xl,
    .worksheet-page .border,
    .worksheet-page .shadow-sm,
    .worksheet-page > div > div {
        break-inside: auto !important;
        page-break-inside: auto !important;
    }

    /* Prevent breaking only for atomic items (like individual questions or list items) */
    .worksheet-page li,
    .worksheet-page tr,
    .break-inside-avoid {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }
  }

  /* --- DARK THEME (Sweet Night / Tatlı Gece) --- */
  html.dark body {
    background-color: #13111C; 
    color: #E2E8F0; 
  }

  html.dark .bg-white,
  html.dark .bg-zinc-50,
  html.dark .bg-zinc-100 {
    background-color: #1F1D2B; 
    color: #E2E8F0;
    border-color: #2D2B3B !important;
  }
  
  html.dark .bg-zinc-50 {
     background-color: #252234 !important;
  }

  html.dark .page {
    background-color: #FDF4FF; 
    color: #4A044E; 
  }
  html.dark .page .bg-white {
      background-color: #FFFFFF !important; 
      color: #000000;
      border-color: #e5e7eb !important;
  }
  html.dark .page .text-zinc-800 {
      color: #1f2937 !important;
  }
  html.dark .page .text-zinc-500 {
      color: #6b7280 !important;
  }

  html.dark aside,
  html.dark header,
  html.dark .bg-zinc-800\/50 {
    background-color: #171520;
    color: #CBD5E1;
    border-color: #2D2B3B !important;
  }
  
  html.dark .bg-white\/80 {
     background-color: rgba(31, 29, 43, 0.95) !important;
     border-color: #2D2B3B !important;
  }

  html.dark .border,
  html.dark .border-zinc-200,
  html.dark .border-zinc-700,
  html.dark .border-zinc-800 {
    border-color: #2D2B3B !important;
  }

  html.dark input, 
  html.dark select, 
  html.dark textarea {
    background-color: #252333 !important;
    border-color: #3E3B50 !important;
    color: #F3E8FF !important;
  }

  html.dark .text-zinc-900, html.dark .text-zinc-800, html.dark .text-zinc-700 { color: #E2E8F0 !important; }
  html.dark .text-zinc-600, html.dark .text-zinc-500, html.dark .text-zinc-400 { color: #94A3B8 !important; }
  html.dark .fill-zinc-900 { fill: #E2E8F0; }
  
  html.dark .text-indigo-600, html.dark .text-indigo-500, html.dark .text-indigo-400 { color: #F472B6 !important; } 
  html.dark .hover\:text-indigo-500:hover { color: #FBCFE8 !important; }
  
  html.dark .bg-indigo-600 { background-color: #DB2777 !important; border-color: #BE185D !important; color: white !important; } 
  html.dark .bg-indigo-600:hover { background-color: #BE185D !important; }
  
  html.dark .bg-indigo-50 { background-color: rgba(219, 39, 119, 0.1) !important; border-color: rgba(219, 39, 119, 0.2) !important; }
  html.dark .focus-visible\:ring-indigo-500:focus-visible { --tw-ring-color: #F472B6 !important; }

  html.dark .text-emerald-600, html.dark .text-emerald-500 { color: #6EE7B7 !important; }
  html.dark .bg-emerald-500 { background-color: #10B981 !important; }
  
  html.dark .text-amber-800, html.dark .text-amber-700 { color: #FDBA74 !important; }
  html.dark .bg-amber-100, html.dark .bg-amber-50 { background-color: rgba(251, 146, 60, 0.1) !important; border-color: rgba(251, 146, 60, 0.2) !important; }

  html.dark .sidebar-activity-item-active {
    background-color: rgba(244, 114, 182, 0.15) !important; 
    color: #F472B6 !important; 
  }
  html.dark .sidebar-activity-item-active::before {
    background-color: #F472B6 !important;
  }

  /* --- PASTEL THEME --- */
  html.theme-pastel body { background-color: #fdf6e3; color: #2c3e50; }
  html.theme-pastel .bg-white, html.theme-pastel .bg-zinc-50, html.theme-pastel .bg-zinc-100 { background-color: #fffdf5; color: #2c3e50; }
  html.theme-pastel .bg-zinc-200, html.theme-pastel .bg-zinc-300 { background-color: #eee8d5; }
  html.theme-pastel .text-zinc-500, html.theme-pastel .text-zinc-600 { color: #657b83; }
  html.theme-pastel .border-zinc-200, html.theme-pastel .border-zinc-300 { border-color: #d3cbb8; }

  /* --- SEPIA THEME --- */
  html.theme-sepia body { background-color: #f4ecd8; color: #59452c; }
  html.theme-sepia .bg-white, html.theme-sepia .bg-zinc-50, html.theme-sepia .page { background-color: #faf6eb; }
  html.theme-sepia aside, html.theme-sepia header, html.theme-sepia .bg-zinc-100 { background-color: #e9dec7; }
  html.theme-sepia .bg-white\/80 { background-color: rgba(233, 222, 199, 0.8) !important; }
  html.theme-sepia .border-zinc-200, html.theme-sepia .border-zinc-700, html.theme-sepia .border-zinc-800 { border-color: #dcd0b8; }
  html.theme-sepia .text-zinc-500, html.theme-sepia .text-zinc-400 { color: #856f51; }
  html.theme-sepia .fill-zinc-900 { fill: #59452c; }
  html.theme-sepia .sidebar-activity-item-active { background-color: #F8F5EE !important; color: #8c6d46 !important; }
  html.theme-sepia .sidebar-activity-item-active::before { background-color: #a98962 !important; }
  html.theme-sepia .text-indigo-600 { color: #8c6d46 !important; }

  /* --- HIGH CONTRAST THEME --- */
  html.theme-contrast body { background-color: #000000; color: #FFFF00; }
  html.theme-contrast .bg-white, html.theme-contrast .bg-zinc-50, html.theme-contrast .bg-zinc-100, html.theme-contrast .bg-zinc-200, html.theme-contrast aside, html.theme-contrast header, html.theme-contrast .bg-white\/80 { background-color: #000000 !important; color: #FFFF00 !important; border-color: #FFFFFF !important; }
  html.theme-contrast .text-zinc-900, html.theme-contrast .text-zinc-800, html.theme-contrast .text-zinc-700, html.theme-contrast .text-zinc-600, html.theme-contrast .text-zinc-500 { color: #FFFF00 !important; }
  html.theme-contrast button { border: 2px solid #FFFFFF; }
  html.theme-contrast .border-zinc-200, html.theme-contrast .border-zinc-300, html.theme-contrast .border, html.theme-contrast input, html.theme-contrast select { border-color: #FFFFFF !important; color: #FFFF00 !important; background-color: #000000 !important; }
  html.theme-contrast .bg-indigo-50 { background-color: #000000 !important; border: 1px solid #FFFF00 !important; }
  html.theme-contrast .text-indigo-600, html.theme-contrast .text-indigo-700 { color: #00FFFF !important; }
  html.theme-contrast .bg-indigo-600 { background-color: #000000 !important; border: 2px solid #00FFFF !important; color: #00FFFF !important; }
  
  /* --- GENERAL UI ENHANCEMENTS & ANIMATIONS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover, a:hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:focus-visible, a:focus-visible { outline: 2px solid #6366F1; outline-offset: 2px; border-radius: 6px; }
  button:not(:disabled):active { transform: translateY(0px) scale(0.98); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; } 50% { transform: translateY(-20px) rotate(5deg); opacity: 0.5; } 100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; } }
  .fade-in { animation: fadeIn 0.5s ease-out forwards; }
  
  .sidebar-activity-item-active { background-color: #EEF2FF !important; color: #4338CA !important; font-weight: 600; position: relative; overflow: hidden; }
  .sidebar-activity-item-active::before { content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; border-radius: 0 4px 4px 0; background-color: #6366F1; }
</style>
