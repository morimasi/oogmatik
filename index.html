<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- OpenDyslexic Font -->
    <link href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic.min.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['OpenDyslexic', 'sans-serif'],
          mono: ['OpenDyslexic', 'sans-serif'],
        },
        colors: {
            // Standartlaştırılmış Marka Renkleri
            brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1', // Ana renk (indigo-500)
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL FONT & RESET --- */
  body, button, input, select, textarea, table, th, td, a, li, ul, ol, div, span, p, h1, h2, h3, h4, h5, h6, label, pre, code {
    font-family: 'OpenDyslexic', sans-serif !important;
  }

  /* --- CUSTOM SCROLLBARS --- */
  /* Modern, ince ve temaya uygun kaydırma çubukları */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background-color: #d4d4d8; /* zinc-300 */
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: #a1a1aa; /* zinc-400 */
  }

  /* Dark Mode Scrollbar */
  html.dark ::-webkit-scrollbar-thumb {
    background-color: #3f3f46; /* zinc-700 */
  }
  html.dark ::-webkit-scrollbar-thumb:hover {
    background-color: #52525b; /* zinc-600 */
  }

  /* --- WORKSHEET DYNAMICS --- */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  .worksheet-page .grid[class*="grid-cols-"] {
      grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); }
    45% { transform: rotateY(180deg); }
    60% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }

  /* --- PAPER SIMULATION (FORCE LIGHT MODE FOR WORKSHEET) --- */
  .worksheet-page {
      background-color: white !important;
      color: #18181b !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05) !important; /* Subtle border via shadow */
  }

  /* Override Dark Mode Styles Inside Worksheet */
  .worksheet-page input, 
  .worksheet-page textarea,
  .worksheet-page .dark\:bg-zinc-800,
  .worksheet-page .dark\:bg-zinc-700,
  .worksheet-page .dark\:bg-zinc-900,
  .worksheet-page .dark\:bg-zinc-700\/50,
  .worksheet-page .dark\:bg-zinc-700\/30,
  .worksheet-page .bg-zinc-50,
  .worksheet-page .bg-zinc-100,
  .worksheet-page .dark\:bg-zinc-800\/50 {
      background-color: #ffffff !important;
      border-color: #d4d4d8 !important;
      color: #18181b !important;
  }
  
  .worksheet-page .dark\:text-zinc-100,
  .worksheet-page .dark\:text-zinc-200,
  .worksheet-page .dark\:text-zinc-300,
  .worksheet-page .dark\:text-white {
      color: #18181b !important; 
  }

  .worksheet-page .dark\:border-zinc-600,
  .worksheet-page .dark\:border-zinc-700 {
      border-color: #d4d4d8 !important;
  }

  /* Maintain Semantic Colors in Print/Worksheet */
  .worksheet-page .dark\:bg-indigo-900\/30 { background-color: #e0e7ff !important; color: #3730a3 !important; } 
  .worksheet-page .dark\:text-indigo-400 { color: #4338ca !important; }
  .worksheet-page .dark\:bg-amber-900\/20 { background-color: #fef3c7 !important; color: #92400e !important; }
  .worksheet-page .dark\:text-amber-200 { color: #92400e !important; }

  /* --- PRINT STYLES --- */
  @media print {
    @page {
      size: A4 portrait;
      margin: 5mm;
    }
    
    html, body {
      width: 100%;
      height: auto !important;
      background-color: white !important;
      color: black !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    #root, .h-screen, .flex, .flex-col, .flex-1, .overflow-hidden, .overflow-y-auto, main {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
    }

    /* Hide UI */
    header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar, .reading-ruler {
      display: none !important;
    }
    
    .worksheet-page {
      width: 100% !important;
      max-width: none !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      box-shadow: none !important;
      page-break-after: always;
    }
    
    .worksheet-page:last-child { page-break-after: auto; }

    /* Compact Spacing for Print */
    .worksheet-page .p-4, .worksheet-page .p-6, .worksheet-page .p-8 { padding: 2mm !important; }
    .worksheet-page .gap-4, .worksheet-page .gap-6, .worksheet-page .gap-8 { gap: 2mm !important; }
    .worksheet-page .mb-4, .worksheet-page .mb-6, .worksheet-page .mb-8 { margin-bottom: 2mm !important; }
    
    /* Typography for Print */
    .pedagogical-header h3 { font-size: 1.4rem !important; margin-bottom: 1mm !important; }
    .pedagogical-header p { font-size: 1rem !important; }

    /* Input & Border Fixes */
    .worksheet-page input, .worksheet-page textarea { border: 1px solid #999 !important; box-shadow: none !important; }
    .border { border-color: #999 !important; }

    /* Break Controls */
    .worksheet-page .grid > *, .worksheet-page li, .worksheet-page tr, .worksheet-page .p-4.border {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }
    
    img { max-height: 150px !important; }
  }

  /* --- THEMES --- */
  
  /* Dark Theme */
  html.dark body { background-color: #13111C; color: #E2E8F0; }
  html.dark .bg-white { background-color: #1F1D2B; color: #E2E8F0; border-color: #2D2B3B !important; }
  
  html.dark aside, html.dark header { background-color: #171520; border-color: #2D2B3B !important; }
  
  html.dark input:not(.worksheet-page input), 
  html.dark select:not(.worksheet-page select), 
  html.dark textarea:not(.worksheet-page textarea) {
    background-color: #252333 !important;
    border-color: #3E3B50 !important;
    color: #F3E8FF !important;
  }

  html.dark .sidebar-activity-item-active {
    background-color: rgba(99, 102, 241, 0.15) !important; /* brand-500 alpha */
    color: #818cf8 !important; /* brand-400 */
  }
  html.dark .sidebar-activity-item-active::before {
    background-color: #6366f1 !important;
  }

  /* Pastel Theme - Softer, easier on eyes */
  html.theme-pastel body { background-color: #fdf6e3; color: #5d5d5d; }
  html.theme-pastel .bg-white, html.theme-pastel .bg-zinc-50 { background-color: #fffdf5; border-color: #eaddcf !important; }
  html.theme-pastel aside, html.theme-pastel header { background-color: #fdf6e3; border-color: #eaddcf !important; }
  html.theme-pastel .text-zinc-900 { color: #5d5d5d !important; }
  html.theme-pastel button.bg-indigo-600 { background-color: #93b5c6 !important; color: #fff !important; }
  html.theme-pastel .text-indigo-600 { color: #7a9eb1 !important; }

  /* Sepia Theme - Warm reading mode */
  html.theme-sepia body { background-color: #f4ecd8; color: #433422; }
  html.theme-sepia .bg-white { background-color: #fdfbf7; border-color: #dcd0b8 !important; }
  html.theme-sepia aside, html.theme-sepia header { background-color: #efe6d0; border-color: #dcd0b8 !important; }
  html.theme-sepia .text-zinc-500 { color: #856f51 !important; }
  html.theme-sepia .sidebar-activity-item-active { background-color: #e9dec7 !important; color: #59452c !important; }
  html.theme-sepia .bg-indigo-600 { background-color: #a98962 !important; border-color: #8c6d46 !important; }

  /* High Contrast Theme - Maximum legibility */
  html.theme-contrast body { background-color: #000000; color: #FFFF00; }
  html.theme-contrast .bg-white, html.theme-contrast .bg-zinc-50, html.theme-contrast aside, html.theme-contrast header { 
      background-color: #000000 !important; 
      color: #FFFF00 !important; 
      border-color: #FFFFFF !important; 
  }
  html.theme-contrast .text-zinc-500, html.theme-contrast .text-zinc-400 { color: #00FF00 !important; }
  html.theme-contrast button { border: 2px solid #FFFFFF !important; background-color: #000 !important; color: #FFF !important; }
  html.theme-contrast .bg-indigo-600 { border: 2px solid #00FFFF !important; color: #00FFFF !important; background: #000 !important; }
  html.theme-contrast input, html.theme-contrast select { 
      background-color: #000 !important; 
      color: #FFF !important; 
      border: 2px solid #FFF !important; 
  }
  
  /* --- UI ENHANCEMENTS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: #e0e7ff !important; /* brand-100 */
      color: #4338ca !important; /* brand-700 */
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
  }
  .sidebar-activity-item-active::before { 
      content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; 
      border-radius: 0 4px 4px 0; background-color: #6366f1; 
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>

{
  "imports": {

</script>
</head>
  <body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 antialiased transition-colors duration-300 overflow-hidden">
    <div id="root" class="h-screen flex flex-col"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
