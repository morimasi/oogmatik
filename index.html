
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Print Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Regular.otf');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Bold.otf');
        font-weight: bold;
        font-style: normal;
      }

      :root {
        /* Anthracite & Gold Theme Configuration */
        --bg-primary: #222226;      /* Main Background (Anthracite) */
        --bg-secondary: #1a1a1d;    /* Secondary/Darker Background */
        --bg-paper: #2d2d32;        /* Cards/Panels (Lighter Anthracite) */
        --bg-inset: #18181b;        /* Input fields/Deep Backgrounds */
        
        --panel-bg: rgba(45, 45, 50, 0.85); /* Semi-transparent panel background */

        --text-primary: #fefce8;    /* Main Text (Off-white/Pale Yellow) */
        --text-secondary: #d4d4d8;  /* Secondary Text (Light Gray) */
        --text-muted: #a1a1aa;      /* Muted Text */
        
        --border-color: #3f3f46;    /* Borders */
        
        --accent-color: #fbbf24;    /* Primary Accent (Gold / Amber 400) */
        --accent-hover: #f59e0b;    /* Accent Hover (Amber 500) */
        --pattern-color: #3f3f46;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
      }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll, handle in app */
      }

      /* Image Saturation Filter */
      img, svg {
        filter: saturate(var(--ui-saturation));
      }

      /* Scrollbar Styling for Dark Theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-inset); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted); 
      }

      /* Print Specific Styles - FORCE WHITE BACKGROUND */
      @media print {
        @page {
          margin: 0;
        }
        :root {
            /* Reset variables for print context */
            --bg-primary: #ffffff !important;
            --bg-paper: #ffffff !important;
            --text-primary: #000000 !important;
            --text-secondary: #333333 !important;
            --border-color: #000000 !important;
        }
        body {
          background-color: white !important;
          color: black !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          overflow: visible;
        }
        .no-print, header, aside, .tour-overlay {
          display: none !important;
        }
        .printable-area {
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          color: black !important;
        }
        /* Ensure background colors and images are printed */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        /* Specific overrides for worksheet */
        .worksheet-page {
            background-color: white !important;
            color: black !important;
            border: none !important;
            box-shadow: none !important;
        }
      }

      /* Custom Scrollbar Utility */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: var(--border-color);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: var(--text-muted);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",

    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
