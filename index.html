<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          // Default Tailwind stacks overridden by CSS variables
          sans: ['var(--ui-font)', 'sans-serif'],
          serif: ['var(--ui-font)', 'serif'],
          mono: ['var(--ui-font)', 'monospace'],
          dyslexic: ['OpenDyslexic', 'sans-serif']
        },
        colors: {
            brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL FONT ENFORCEMENT --- */
  :root {
    --ui-font: 'OpenDyslexic'; /* Default to OpenDyslexic */
    --ui-spacing: normal;
    --ui-scale: 1;
    --ui-line-height: 1.6;
    --ui-saturation: 100%;

    /* Theme Defaults (Light - Zinc) */
    --bg-primary: #fafafa;
    --bg-secondary: #f4f4f5;
    --bg-paper: #ffffff;
    --text-primary: #18181b;
    --text-secondary: #71717a;
    --text-muted: #a1a1aa;
    --border-color: #e4e4e7;
    --panel-bg: rgba(255, 255, 255, 0.85);
    --pattern-color: rgba(0,0,0,0.03);
  }

  /* 
     SMART FONT ENFORCEMENT
     Apply the font to everything EXCEPT icon elements.
     Using specific exclusions prevents breaking FontAwesome icons.
  */
  *:not(.fa):not(.fas):not(.far):not(.fab):not(.fa-solid):not(.fa-regular):not(.fa-brands):not(i) {
    font-family: var(--ui-font), sans-serif !important;
    letter-spacing: var(--ui-spacing);
    line-height: var(--ui-line-height);
  }

  html {
      filter: saturate(var(--ui-saturation));
  }

  /* --- THEME DEFINITIONS --- */
  /* Apply to html.class OR .class for preview box */
  
  html.dark, .theme-dark {
      --bg-primary: #18181b;
      --bg-secondary: #27272a;
      --bg-paper: #27272a;
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-color: #3f3f46;
      --panel-bg: rgba(39, 39, 42, 0.9);
      --pattern-color: rgba(255,255,255,0.02);
  }

  html.theme-anthracite, .theme-anthracite {
      --bg-primary: #222226;
      --bg-secondary: #303034;
      --bg-paper: #303034;
      --text-primary: #f5f5f5;
      --text-secondary: #FFC700;
      --text-muted: #9e9e9e;
      --border-color: #444448;
      --panel-bg: rgba(40, 40, 44, 0.95);
      --pattern-color: rgba(255, 199, 0, 0.04);
  }

  html.theme-anthracite-gold, .theme-anthracite-gold {
      --bg-primary: #1f1f22;
      --bg-secondary: #2d2d30;
      --bg-paper: #2d2d30;
      --text-primary: #f0eadd;
      --text-secondary: #FFB800; /* More golden yellow */
      --text-muted: #a0988a;
      --border-color: #4a4a4f;
      --panel-bg: rgba(35, 35, 38, 0.95);
      --pattern-color: rgba(255, 184, 0, 0.03);
  }
  
  html.theme-anthracite-cyber, .theme-anthracite-cyber {
      --bg-primary: #000000;
      --bg-secondary: #111111;
      --bg-paper: #111111;
      --text-primary: #F3FF00; /* Bright neon yellow */
      --text-secondary: #F3FF00;
      --text-muted: #bbbbbb;
      --border-color: #F3FF00;
      --panel-bg: rgba(10, 10, 10, 0.9);
      --pattern-color: rgba(243, 255, 0, 0.05);
  }
  
  html.theme-anthracite-bumblebee, .theme-anthracite-bumblebee {
      --bg-primary: #28282b;
      --bg-secondary: #3d3d41;
      --bg-paper: #3d3d41;
      --text-primary: #ffffff;
      --text-secondary: #FFD700;
      --text-muted: #b0b0b0;
      --border-color: #FFD700;
      --panel-bg: rgba(50, 40, 0, 0.90);
      --pattern-color: rgba(255, 215, 0, 0.08);
  }

  html.theme-pastel, .theme-pastel {
      --bg-primary: #2c2a25;
      --bg-secondary: #3f3d39;
      --bg-paper: #3a3832;
      --text-primary: #e6e0d0;
      --text-secondary: #afa895;
      --text-muted: #787366;
      --border-color: #5c564b;
      --panel-bg: rgba(50, 48, 44, 0.95);
      --pattern-color: rgba(230, 224, 208, 0.04);
  }

  html.theme-sepia, .theme-sepia {
      --bg-primary: #2b2016;
      --bg-secondary: #3d2e22;
      --bg-paper: #3d2e22;
      --text-primary: #ead9c3;
      --text-secondary: #a89f91;
      --text-muted: #70685e;
      --border-color: #5c4030;
      --panel-bg: rgba(62, 45, 32, 0.95);
      --pattern-color: rgba(234, 217, 195, 0.04);
  }

  html.theme-purple, .theme-purple {
      --bg-primary: #180f24;
      --bg-secondary: #251738;
      --bg-paper: #2d1b45;
      --text-primary: #e9d5ff;
      --text-secondary: #c084fc;
      --text-muted: #7e22ce;
      --border-color: #4c2f6e;
      --panel-bg: rgba(38, 24, 56, 0.95);
      --pattern-color: rgba(233, 213, 255, 0.04);
  }

  html.theme-orange, .theme-orange {
      --bg-primary: #261209;
      --bg-secondary: #3f1e0e;
      --bg-paper: #4a2412;
      --text-primary: #ffedd5;
      --text-secondary: #fb923c;
      --text-muted: #c2410c;
      --border-color: #7c2d12;
      --panel-bg: rgba(61, 31, 20, 0.95);
      --pattern-color: rgba(255, 237, 213, 0.04);
  }

  html.theme-maroon, .theme-maroon {
      --bg-primary: #23080e;
      --bg-secondary: #3f0e19;
      --bg-paper: #4a1220;
      --text-primary: #ffe4e6;
      --text-secondary: #fb7185;
      --text-muted: #be123c;
      --border-color: #881337;
      --panel-bg: rgba(63, 16, 25, 0.95);
      --pattern-color: rgba(255, 228, 230, 0.04);
  }

  html.theme-contrast, .theme-contrast {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-paper: #000000;
      --text-primary: #FFFF00;
      --text-secondary: #00FF00;
      --text-muted: #00FF00;
      --border-color: #FFFFFF;
      --panel-bg: #000000;
      --pattern-color: transparent;
  }

  /* --- GLOBAL STYLES WITH VARS --- */
  body {
    font-size: calc(16px * var(--ui-scale));
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: background-color 0.4s ease, color 0.3s ease;
    
    /* Subtle Texture: Dots */
    background-image: 
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px),
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
  }

  /* UI Elements using Theme Variables */
  aside, header {
      background-color: var(--panel-bg) !important;
      border-color: var(--border-color) !important;
      color: var(--text-primary) !important;
      backdrop-filter: blur(12px);
  }

  /* Map Tailwind utilities to CSS Variables to enforce theme consistency */
  .bg-white { background-color: var(--bg-paper) !important; }
  .bg-zinc-50 { background-color: var(--bg-secondary) !important; }
  .border-zinc-200, .border-zinc-100 { border-color: var(--border-color) !important; }
  .text-zinc-900, .text-zinc-800 { color: var(--text-primary) !important; }
  .text-zinc-600, .text-zinc-500, .text-zinc-400 { color: var(--text-secondary) !important; }
  
  /* --- ANTHRACITE THEME BUTTON OVERRIDE --- */
  html[class*="theme-anthracite"] .bg-indigo-600,
  html[class*="theme-anthracite"] .from-violet-600 {
      background-image: none !important;
      background-color: var(--text-secondary) !important;
      color: var(--bg-primary) !important;
  }
  html[class*="theme-anthracite"] .hover\:bg-indigo-700:hover {
      filter: brightness(1.1);
  }
  html[class*="theme-anthracite"] .sidebar-activity-item-active { 
      background-color: var(--panel-bg) !important;
      color: var(--text-secondary) !important;
  }

  /* Special handling for dark/theme mode specific utility classes */
  html.dark .dark\:bg-zinc-800, 
  [class*="theme-"] .dark\:bg-zinc-800 { 
      background-color: var(--bg-paper) !important; 
  }
  html.dark .dark\:border-zinc-700,
  [class*="theme-"] .dark\:border-zinc-700 {
      border-color: var(--border-color) !important;
  }

  /* --- ICON PROTECTION (Double Safety) --- */
  .fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands, i[class*="fa-"] {
      font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
      font-style: normal;
      font-variant: normal;
      line-height: 1;
      text-rendering: auto;
      font-weight: 900; /* Solid icons need weight */
  }
  .fa-brands, .fab {
      font-weight: 400;
  }
  .fa-regular, .far {
      font-weight: 400;
  }

  /* --- ACCESSIBILITY: HIGH CONTRAST FOCUS RINGS --- */
  *:focus-visible {
    outline: 3px solid #4f46e5 !important;
    outline-offset: 2px !important;
    border-radius: 4px;
  }
  html.dark *:focus-visible, [class*="theme-"] *:focus-visible {
    outline-color: var(--text-secondary) !important;
  }

  /* --- CUSTOM SCROLLBARS --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background-color: var(--border-color);
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: var(--text-secondary);
  }

  /* --- WORKSHEET DYNAMICS --- */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  .worksheet-page .dynamic-grid {
      display: grid;
      grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important;
      gap: 1rem;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); }
    45% { transform: rotateY(180deg); }
    60% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }
  
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }

  /* --- PAPER SIMULATION (The Protected Area) --- */
  /* 
     IMPORTANT: Worksheet styles MUST be isolated from the app theme.
     They should always look like paper (White bg, Black text) for printing consistency.
  */
  .worksheet-page {
      background-color: #ffffff !important;
      color: #000000 !important;
      letter-spacing: normal !important; 
      line-height: 1.5 !important;
      font-size: 1rem !important; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05) !important;
      transition: box-shadow 0.3s ease;
  }
  
  .worksheet-page h1, .worksheet-page h2, .worksheet-page h3, .worksheet-page h4, 
  .worksheet-page h5, .worksheet-page h6, .worksheet-page p, .worksheet-page span, 
  .worksheet-page li, .worksheet-page div {
      color: inherit; 
  }

  @media screen {
      .worksheet-page:hover {
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.05) !important;
      }
  }

  /* Override Dark Mode & Themes Inside Worksheet to ensure Print Look */
  .worksheet-page input, 
  .worksheet-page textarea,
  .worksheet-page .bg-white,
  .worksheet-page .dark\:bg-zinc-800,
  .worksheet-page .dark\:bg-zinc-700,
  .worksheet-page .dark\:bg-zinc-900,
  .worksheet-page .dark\:bg-zinc-700\/50,
  .worksheet-page .bg-zinc-50,
  .worksheet-page .bg-zinc-100,
  html[class*="theme-"] .worksheet-page .bg-white {
      background-color: #ffffff !important;
      border-color: #d4d4d8 !important;
      color: #18181b !important;
  }
  
  .worksheet-page .text-zinc-800,
  .worksheet-page .dark\:text-zinc-100,
  .worksheet-page .dark\:text-zinc-200,
  .worksheet-page .dark\:text-zinc-300,
  .worksheet-page .dark\:text-white {
      color: #18181b !important; 
  }
  
  /* Preserve Semantic Colors inside Worksheet */
  .worksheet-page .text-indigo-600 { color: #4f46e5 !important; }
  .worksheet-page .text-emerald-600 { color: #059669 !important; }
  .worksheet-page .text-amber-600 { color: #d97706 !important; }
  .worksheet-page .text-rose-600 { color: #e11d48 !important; }
  .worksheet-page .bg-indigo-100 { background-color: #e0e7ff !important; }
  
  /* --- PRINT STYLES --- */
  @media print {
    @page { size: A4 portrait; margin: 5mm; }
    html, body { width: 100%; height: auto !important; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; font-size: 12pt !important; }
    #root, .h-screen, .flex, .flex-col, .flex-1, .overflow-hidden, .overflow-y-auto, main { height: auto !important; overflow: visible !important; display: block !important; }
    header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar, .reading-ruler { display: none !important; }
    .worksheet-page { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; page-break-after: always; transform: none !important; }
    .worksheet-page:last-child { page-break-after: auto; }
    img { max-height: 150px !important; }
  }

  /* --- UI ENHANCEMENTS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: #e0e7ff; 
      color: #4338ca; 
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
  }
  html:not(.dark):not([class*="theme-"]) .sidebar-activity-item-active {
      background-color: rgba(99, 102, 241, 0.1);
  }
  .sidebar-activity-item-active::before { 
      content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; 
      border-radius: 0 4px 4px 0; background-color: currentColor; 
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
