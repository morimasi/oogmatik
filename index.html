
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- OpenDyslexic Font -->
    <link href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic.min.css" rel="stylesheet">
    <!-- Google Fonts: Lexend (Science-backed reading font), Inter, Lora, Comic Neue -->

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          // Default Tailwind stacks overridden by CSS variables
          sans: ['var(--ui-font)', 'sans-serif'],
          serif: ['var(--ui-font)', 'serif'],
          mono: ['var(--ui-font)', 'monospace'],
          dyslexic: ['OpenDyslexic', 'sans-serif']
        },
        colors: {
            brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL FONT ENFORCEMENT --- */
  :root {
    --ui-font: 'Lexend'; /* Default to Lexend for readability */
    --ui-spacing: normal;
    --ui-scale: 1;
    --ui-line-height: 1.6;
    --ui-saturation: 100%;
  }

  /* 
     SMART FONT ENFORCEMENT
     Apply the font to everything EXCEPT icon elements.
     Using specific exclusions prevents breaking FontAwesome icons.
  */
  *:not(.fa):not(.fas):not(.far):not(.fab):not(.fa-solid):not(.fa-regular):not(.fa-brands):not(i) {
    font-family: var(--ui-font), sans-serif !important;
    letter-spacing: var(--ui-spacing);
    line-height: var(--ui-line-height);
  }

  html {
      filter: saturate(var(--ui-saturation));
  }

  body {
    font-size: calc(16px * var(--ui-scale));
    background-color: #fafafa;
    color: #18181b;
  }

  /* --- ICON PROTECTION (Double Safety) --- */
  .fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands, i[class*="fa-"] {
      font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
      font-style: normal;
      font-variant: normal;
      line-height: 1;
      text-rendering: auto;
      font-weight: 900; /* Solid icons need weight */
  }
  .fa-brands, .fab {
      font-weight: 400;
  }
  .fa-regular, .far {
      font-weight: 400;
  }

  /* --- ACCESSIBILITY: HIGH CONTRAST FOCUS RINGS --- */
  *:focus-visible {
    outline: 3px solid #4f46e5 !important;
    outline-offset: 2px !important;
    border-radius: 4px;
  }
  html.dark *:focus-visible {
    outline-color: #818cf8 !important;
  }

  /* --- CUSTOM SCROLLBARS --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background-color: rgba(161, 161, 170, 0.5);
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: rgba(113, 113, 122, 0.8);
  }

  /* --- WORKSHEET DYNAMICS --- */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  /* Dynamic Column Handling inside Worksheet */
  .worksheet-page .dynamic-grid {
      display: grid;
      grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important;
      gap: 1rem;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); }
    45% { transform: rotateY(180deg); }
    60% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }
  
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }

  /* --- PAPER SIMULATION (The Protected Area) --- */
  .worksheet-page {
      background-color: #ffffff !important;
      color: #000000 !important;
      /* Use dynamic font but keep other props fixed */
      /* Note: The global * selector above handles font-family via variable */
      letter-spacing: normal !important; 
      line-height: 1.5 !important;
      font-size: 1rem !important; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05) !important;
      transition: box-shadow 0.3s ease;
  }
  
  .worksheet-page h1, .worksheet-page h2, .worksheet-page h3, .worksheet-page h4, 
  .worksheet-page h5, .worksheet-page h6, .worksheet-page p, .worksheet-page span, 
  .worksheet-page li, .worksheet-page div {
      color: inherit; 
  }

  @media screen {
      .worksheet-page:hover {
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.05) !important;
      }
  }

  /* Override Dark Mode & Themes Inside Worksheet to ensure Print Look */
  .worksheet-page input, 
  .worksheet-page textarea,
  .worksheet-page .bg-white,
  .worksheet-page .dark\:bg-zinc-800,
  .worksheet-page .dark\:bg-zinc-700,
  .worksheet-page .dark\:bg-zinc-900,
  .worksheet-page .dark\:bg-zinc-700\/50,
  .worksheet-page .bg-zinc-50,
  .worksheet-page .bg-zinc-100,
  html.theme-pastel .worksheet-page .bg-white,
  html.theme-sepia .worksheet-page .bg-white,
  html.theme-purple .worksheet-page .bg-white,
  html.theme-orange .worksheet-page .bg-white,
  html.theme-maroon .worksheet-page .bg-white {
      background-color: #ffffff !important;
      border-color: #d4d4d8 !important;
      color: #18181b !important;
  }
  
  .worksheet-page .text-zinc-800,
  .worksheet-page .dark\:text-zinc-100,
  .worksheet-page .dark\:text-zinc-200,
  .worksheet-page .dark\:text-zinc-300,
  .worksheet-page .dark\:text-white {
      color: #18181b !important; 
  }
  
  /* Preserve Semantic Colors inside Worksheet */
  .worksheet-page .text-indigo-600 { color: #4f46e5 !important; }
  .worksheet-page .text-emerald-600 { color: #059669 !important; }
  .worksheet-page .text-amber-600 { color: #d97706 !important; }
  .worksheet-page .text-rose-600 { color: #e11d48 !important; }
  .worksheet-page .bg-indigo-100 { background-color: #e0e7ff !important; }
  
  /* --- PRINT STYLES --- */
  @media print {
    @page { size: A4 portrait; margin: 5mm; }
    html, body { width: 100%; height: auto !important; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; font-size: 12pt !important; }
    #root, .h-screen, .flex, .flex-col, .flex-1, .overflow-hidden, .overflow-y-auto, main { height: auto !important; overflow: visible !important; display: block !important; }
    header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar, .reading-ruler { display: none !important; }
    .worksheet-page { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; page-break-after: always; transform: none !important; }
    .worksheet-page:last-child { page-break-after: auto; }
    img { max-height: 150px !important; }
  }

  /* --- GLOBAL THEMES (DARK MODE BASE FOR COLORS) --- */
  
  /* Default Light Theme */
  body {
      background-color: #fafafa; /* zinc-50 */
      color: #18181b; /* zinc-900 */
  }

  /* Dark Theme (Standard) */
  html.dark body { 
      background-color: #18181b; /* zinc-900 */
      color: #f4f4f5; /* zinc-100 */
  }
  html.dark aside, html.dark header, html.dark .bg-white {
      background-color: rgba(39, 39, 42, 0.95) !important; /* zinc-800 */
      border-color: #3f3f46 !important;
      color: #f4f4f5;
  }
  html.dark .text-zinc-500 { color: #a1a1aa !important; }
  html.dark .bg-zinc-50 { background-color: #27272a !important; }

  /* Pastel Theme */
  html.theme-pastel body { 
      background-color: #2c2a25; 
      color: #e6e0d0; 
  }
  html.theme-pastel aside, html.theme-pastel header, html.theme-pastel .bg-white { 
      background-color: rgba(50, 48, 44, 0.95) !important; 
      border-color: #5c564b !important; 
      color: #e6e0d0 !important;
  }
  
  /* Sepia Theme */
  html.theme-sepia body { 
      background-color: #2b2016;
      color: #ead9c3; 
  }
  html.theme-sepia aside, html.theme-sepia header, html.theme-sepia .bg-white { 
      background-color: rgba(62, 45, 32, 0.95) !important; 
      border-color: #5c4030 !important;
      color: #ead9c3 !important;
  }

  /* Purple Theme */
  html.theme-purple body { 
      background-color: #180f24; 
      color: #e9d5ff; 
  }
  html.theme-purple aside, html.theme-purple header, html.theme-purple .bg-white { 
      background-color: rgba(38, 24, 56, 0.95) !important; 
      border-color: #4c2f6e !important;
      color: #e9d5ff !important;
  }

  /* Orange Theme */
  html.theme-orange body { 
      background-color: #261209; 
      color: #ffedd5; 
  }
  html.theme-orange aside, html.theme-orange header, html.theme-orange .bg-white { 
      background-color: rgba(61, 31, 20, 0.95) !important; 
      border-color: #7c2d12 !important;
      color: #ffedd5 !important;
  }

  /* Maroon Theme */
  html.theme-maroon body { 
      background-color: #23080e; 
      color: #ffe4e6; 
  }
  html.theme-maroon aside, html.theme-maroon header, html.theme-maroon .bg-white { 
      background-color: rgba(63, 16, 25, 0.95) !important; 
      border-color: #881337 !important;
      color: #ffe4e6 !important;
  }

  /* High Contrast Theme */
  html.theme-contrast body { 
      background-color: #000000; 
      color: #FFFF00; 
  }
  html.theme-contrast aside, html.theme-contrast header, html.theme-contrast .bg-white, html.theme-contrast .bg-zinc-50 { 
      background-color: #000000 !important; 
      color: #FFFF00 !important; 
      border-color: #FFFFFF !important; 
  }
  html.theme-contrast .text-zinc-500, html.theme-contrast .text-zinc-400, html.theme-contrast .text-zinc-600, html.theme-contrast .text-zinc-800, html.theme-contrast .text-zinc-700 { 
      color: #00FF00 !important; 
  }
  html.theme-contrast button, html.theme-contrast input, html.theme-contrast select { 
      border: 2px solid #FFFFFF !important; 
      background-color: #000000 !important; 
      color: #FFFFFF !important; 
  }
  html.theme-contrast .bg-indigo-600 { 
      border: 2px solid #00FFFF !important; 
      color: #00FFFF !important; 
      background-color: #000000 !important; 
  }
  html.theme-contrast .text-indigo-600 { color: #00FFFF !important; }

  /* --- UI ENHANCEMENTS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: #e0e7ff; 
      color: #4338ca; 
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
  }
  html:not(.dark):not([class*="theme-"]) .sidebar-activity-item-active {
      background-color: rgba(99, 102, 241, 0.1);
  }
  .sidebar-activity-item-active::before { 
      content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; 
      border-radius: 0 4px 4px 0; background-color: currentColor; 
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
