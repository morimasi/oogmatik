
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- OpenDyslexic Font -->
    <link href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic.min.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['OpenDyslexic', 'sans-serif'],
          mono: ['OpenDyslexic', 'sans-serif'],
        },
        colors: {
            // Standartlaştırılmış Marka Renkleri (Indigo Base)
            brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1', // Ana renk (indigo-500)
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL FONT & RESET --- */
  body, button, input, select, textarea, table, th, td, a, li, ul, ol, div, span, p, h1, h2, h3, h4, h5, h6, label, pre, code {
    font-family: 'OpenDyslexic', sans-serif !important;
  }

  /* --- CUSTOM SCROLLBARS --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background-color: rgba(161, 161, 170, 0.5); /* Transparent zinc */
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: rgba(113, 113, 122, 0.8);
  }

  /* --- WORKSHEET DYNAMICS --- */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  .worksheet-page .grid[class*="grid-cols-"] {
      grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); }
    45% { transform: rotateY(180deg); }
    60% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }

  /* --- PAPER SIMULATION (The Protected Area) --- */
  /* Bu alan her zaman beyaz kağıt, siyah yazı olmalıdır. Tema ne olursa olsun. */
  .worksheet-page {
      background-color: #ffffff !important;
      color: #000000 !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05) !important;
      transition: box-shadow 0.3s ease;
  }
  
  /* Worksheet içindeki tüm metin elemanlarını zorla siyaha çevir (kontrast teması vb. bozmasın) */
  .worksheet-page h1, .worksheet-page h2, .worksheet-page h3, .worksheet-page h4, 
  .worksheet-page h5, .worksheet-page h6, .worksheet-page p, .worksheet-page span, 
  .worksheet-page li, .worksheet-page div {
      color: inherit; /* Inherit from .worksheet-page which is black */
  }

  @media screen {
      .worksheet-page:hover {
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.05) !important;
      }
  }

  /* Override Dark Mode & Themes Inside Worksheet to ensure Print Look */
  .worksheet-page input, 
  .worksheet-page textarea,
  .worksheet-page .bg-white,
  .worksheet-page .dark\:bg-zinc-800,
  .worksheet-page .dark\:bg-zinc-700,
  .worksheet-page .dark\:bg-zinc-900,
  .worksheet-page .dark\:bg-zinc-700\/50,
  .worksheet-page .bg-zinc-50,
  .worksheet-page .bg-zinc-100 {
      background-color: #ffffff !important;
      border-color: #d4d4d8 !important;
      color: #18181b !important;
  }
  
  .worksheet-page .text-zinc-800,
  .worksheet-page .dark\:text-zinc-100,
  .worksheet-page .dark\:text-zinc-200,
  .worksheet-page .dark\:text-zinc-300,
  .worksheet-page .dark\:text-white {
      color: #18181b !important; 
  }
  
  /* Preserve Semantic Colors inside Worksheet (Don't force grayscale everywhere) */
  .worksheet-page .text-indigo-600 { color: #4f46e5 !important; }
  .worksheet-page .text-emerald-600 { color: #059669 !important; }
  .worksheet-page .text-amber-600 { color: #d97706 !important; }
  .worksheet-page .text-rose-600 { color: #e11d48 !important; }
  .worksheet-page .bg-indigo-100 { background-color: #e0e7ff !important; }
  
  /* --- PRINT STYLES --- */
  @media print {
    @page { size: A4 portrait; margin: 5mm; }
    html, body { width: 100%; height: auto !important; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    #root, .h-screen, .flex, .flex-col, .flex-1, .overflow-hidden, .overflow-y-auto, main { height: auto !important; overflow: visible !important; display: block !important; }
    header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar, .reading-ruler { display: none !important; }
    .worksheet-page { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; page-break-after: always; }
    .worksheet-page:last-child { page-break-after: auto; }
    img { max-height: 150px !important; }
  }

  /* --- GLOBAL THEMES --- */
  /* Default Light Theme */
  body {
      background-color: #fafafa; /* zinc-50 */
      color: #18181b; /* zinc-900 */
  }

  /* Dark Theme */
  html.dark body { 
      background-color: #18181b; /* zinc-900 */
      color: #f4f4f5; /* zinc-100 */
  }
  html.dark aside, html.dark header, html.dark .bg-white {
      background-color: #27272a !important; /* zinc-800 for panels */
      border-color: #3f3f46 !important; /* zinc-700 */
      color: #f4f4f5;
  }
  html.dark .text-zinc-500 { color: #a1a1aa !important; }
  html.dark .bg-zinc-50 { background-color: #27272a !important; }

  /* Pastel Theme */
  html.theme-pastel body { 
      background-color: #fdf6e3; 
      color: #5d5d5d; 
  }
  html.theme-pastel aside, html.theme-pastel header, html.theme-pastel .bg-white { 
      background-color: #fffdf5 !important; 
      border-color: #eaddcf !important; 
      color: #5d5d5d !important;
  }
  html.theme-pastel .text-zinc-500 { color: #8b8b8b !important; }
  html.theme-pastel button.bg-indigo-600 { background-color: #93b5c6 !important; color: #fff !important; }
  html.theme-pastel .text-indigo-600 { color: #7a9eb1 !important; }
  
  /* Sepia Theme */
  html.theme-sepia body { 
      background-color: #f4ecd8; 
      color: #433422; 
  }
  html.theme-sepia aside, html.theme-sepia header, html.theme-sepia .bg-white { 
      background-color: #fdfbf7 !important; 
      border-color: #dcd0b8 !important;
      color: #433422 !important;
  }
  html.theme-sepia .text-zinc-500 { color: #856f51 !important; }
  html.theme-sepia .bg-indigo-600 { background-color: #a98962 !important; border-color: #8c6d46 !important; }
  html.theme-sepia .text-indigo-600 { color: #8c6d46 !important; }

  /* High Contrast Theme */
  html.theme-contrast body { 
      background-color: #000000; 
      color: #FFFF00; 
  }
  html.theme-contrast aside, html.theme-contrast header, html.theme-contrast .bg-white, html.theme-contrast .bg-zinc-50 { 
      background-color: #000000 !important; 
      color: #FFFF00 !important; 
      border-color: #FFFFFF !important; 
  }
  html.theme-contrast .text-zinc-500, html.theme-contrast .text-zinc-400, html.theme-contrast .text-zinc-600 { 
      color: #00FF00 !important; 
  }
  html.theme-contrast button, html.theme-contrast input, html.theme-contrast select { 
      border: 2px solid #FFFFFF !important; 
      background-color: #000000 !important; 
      color: #FFFFFF !important; 
  }
  html.theme-contrast .bg-indigo-600 { 
      border: 2px solid #00FFFF !important; 
      color: #00FFFF !important; 
      background-color: #000000 !important; 
  }
  html.theme-contrast .text-indigo-600 { color: #00FFFF !important; }

  /* Purple Theme (Mor) */
  html.theme-purple body { 
      background-color: #f3e8ff; /* purple-100 */
      color: #3b0764; /* purple-950 */
  }
  html.theme-purple aside, html.theme-purple header, html.theme-purple .bg-white { 
      background-color: #ffffff !important; 
      border-color: #d8b4fe !important;
      color: #4c1d95 !important;
  }
  html.theme-purple .text-zinc-500 { color: #6b21a8 !important; }
  html.theme-purple .bg-indigo-600 { background-color: #9333ea !important; }
  html.theme-purple .text-indigo-600 { color: #7e22ce !important; }
  html.theme-purple .sidebar-activity-item-active { background-color: #e9d5ff !important; color: #6b21a8 !important; }

  /* Orange Theme (Turuncu) */
  html.theme-orange body { 
      background-color: #fff7ed; /* orange-50 */
      color: #431407; /* orange-950 */
  }
  html.theme-orange aside, html.theme-orange header, html.theme-orange .bg-white { 
      background-color: #ffffff !important; 
      border-color: #fed7aa !important;
      color: #7c2d12 !important;
  }
  html.theme-orange .text-zinc-500 { color: #9a3412 !important; }
  html.theme-orange .bg-indigo-600 { background-color: #ea580c !important; }
  html.theme-orange .text-indigo-600 { color: #c2410c !important; }
  html.theme-orange .sidebar-activity-item-active { background-color: #ffedd5 !important; color: #9a3412 !important; }

  /* Maroon Theme (Bordo) */
  html.theme-maroon body { 
      background-color: #fff1f2; /* rose-50 */
      color: #881337; /* rose-900 */
  }
  html.theme-maroon aside, html.theme-maroon header, html.theme-maroon .bg-white { 
      background-color: #ffffff !important; 
      border-color: #fecdd3 !important;
      color: #881337 !important;
  }
  html.theme-maroon .text-zinc-500 { color: #9f1239 !important; }
  html.theme-maroon .bg-indigo-600 { background-color: #be123c !important; }
  html.theme-maroon .text-indigo-600 { color: #9f1239 !important; }
  html.theme-maroon .sidebar-activity-item-active { background-color: #ffe4e6 !important; color: #881337 !important; }

  /* --- UI ENHANCEMENTS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: #e0e7ff; 
      color: #4338ca; 
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
  }
  html:not(.dark) .sidebar-activity-item-active {
      background-color: rgba(99, 102, 241, 0.1);
  }
  .sidebar-activity-item-active::before { 
      content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; 
      border-radius: 0 4px 4px 0; background-color: currentColor; 
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "@vercel/node": "https://aistudiocdn.com/@vercel/node@^5.5.6",
    "vite": "https://aistudiocdn.com/vite@^7.2.2",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.84.0"
  }
}
</script>
</head>
  <body class="antialiased transition-colors duration-300 overflow-hidden">
    <div id="root" class="h-screen flex flex-col"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
