<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oogmatik | Ultra Creative Studio</title>
  <meta name="description" content="Nöro-mimari ve özel eğitim için derinlikli materyal üretim merkezi." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: {
              50: 'var(--c-zinc-50, #fafafa)',
              100: 'var(--c-zinc-100, #f4f4f5)',
              200: 'var(--c-zinc-200, #e4e4e7)',
              300: 'var(--c-zinc-300, #d4d4d8)',
              400: 'var(--c-zinc-400, #a1a1aa)',
              500: 'var(--c-zinc-500, #71717a)',
              600: 'var(--c-zinc-600, #52525b)',
              700: 'var(--c-zinc-700, #3f3f46)',
              800: 'var(--c-zinc-800, #27272a)',
              900: 'var(--c-zinc-900, #18181b)',
              950: 'var(--c-zinc-950, #09090b)',
            },
            indigo: {
              50: 'var(--c-indigo-50, #eef2ff)',
              100: 'var(--c-indigo-100, #e0e7ff)',
              200: 'var(--c-indigo-200, #c7d2fe)',
              300: 'var(--c-indigo-300, #a5b4fc)',
              400: 'var(--c-indigo-400, #818cf8)',
              500: 'var(--c-indigo-500, #6366f1)',
              600: 'var(--c-indigo-600, #4f46e5)',
              700: 'var(--c-indigo-700, #4338ca)',
              800: 'var(--c-indigo-800, #3730a3)',
              900: 'var(--c-indigo-900, #312e81)',
              950: 'var(--c-indigo-950, #1e1b4b)',
            },
          },
        },
      },
    };
  </script>
  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Global Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      /* Design Tokens - Default (Anthracite) */
      --bg-primary-rgb: 18, 18, 20;
      --bg-secondary-rgb: 10, 10, 11;
      --bg-paper-rgb: 24, 24, 27;
      --bg-inset-rgb: 9, 9, 11;

      --bg-primary: rgb(var(--bg-primary-rgb));
      --bg-secondary: rgb(var(--bg-secondary-rgb));
      --bg-paper: rgb(var(--bg-paper-rgb));
      --bg-inset: rgb(var(--bg-inset-rgb));

      --surface-glass: rgba(255, 255, 255, 0.03);
      --surface-elevated: rgba(255, 255, 255, 0.05);

      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;

      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-muted: rgba(99, 102, 241, 0.1);

      --radius-premium: 16px;
      --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --blur-premium: 20px;

      --ui-font: var(--app-font-family, 'Lexend', sans-serif);
      --ui-scale: var(--app-font-size-scale, 1);
      --ui-spacing: var(--app-letter-spacing, normal);
      --ui-line-height: var(--app-line-height, 1.6);
      --ui-saturation: var(--app-saturation, 100%);
      --sidebar-width: 320px;

      /* Transition */
      --app-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- THEME DEFINITIONS --- */

    :root.theme-light {
      --bg-primary-rgb: 248, 250, 252;
      --bg-secondary-rgb: 241, 245, 249;
      --bg-paper-rgb: 255, 255, 255;
      --bg-inset-rgb: 241, 245, 249;
      --surface-glass: rgba(0, 0, 0, 0.02);
      --surface-elevated: rgba(0, 0, 0, 0.04);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: rgba(0, 0, 0, 0.06);
      --accent-color: #4f46e5;
      --accent-hover: #4338ca;
      --accent-muted: rgba(79, 70, 229, 0.08);
      --shadow-premium: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
    }

    :root.theme-dark {
      --bg-primary-rgb: 9, 9, 11;
      --bg-secondary-rgb: 2, 2, 3;
      --bg-paper-rgb: 18, 18, 20;
      --bg-inset-rgb: 0, 0, 0;
      --surface-glass: rgba(255, 255, 255, 0.02);
      --surface-elevated: rgba(255, 255, 255, 0.04);
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --border-color: rgba(255, 255, 255, 0.06);
      --accent-color: #818cf8;
      --accent-hover: #6366f1;
      --accent-muted: rgba(129, 140, 248, 0.1);
    }

    :root.theme-anthracite-gold {
      --bg-primary-rgb: 18, 18, 20;
      --bg-paper-rgb: 28, 28, 31;
      --accent-color: #fbbf24;
      --accent-hover: #f59e0b;
      --accent-muted: rgba(251, 191, 36, 0.1);
      --border-color: rgba(251, 191, 36, 0.15);
    }

    :root.theme-anthracite-cyber {
      --bg-primary-rgb: 5, 5, 5;
      --bg-paper-rgb: 13, 13, 13;
      --bg-secondary-rgb: 0, 0, 0;
      --accent-color: #ec4899;
      --accent-hover: #db2777;
      --text-primary: #ffffff;
      --border-color: rgba(236, 72, 153, 0.2);
      --accent-muted: rgba(236, 72, 153, 0.1);
      --shadow-premium: 0 0 20px rgba(236, 72, 153, 0.15);
    }

    :root.theme-space {
      --bg-primary-rgb: 2, 6, 23;
      --bg-paper-rgb: 15, 23, 42;
      --bg-secondary-rgb: 2, 6, 23;
      --accent-color: #38bdf8;
      --accent-hover: #0ea5e9;
      --text-primary: #f1f5f9;
      --border-color: rgba(56, 189, 248, 0.1);
      --accent-muted: rgba(56, 189, 248, 0.05);
    }

    :root.theme-nature {
      --bg-primary-rgb: 5, 46, 22;
      --bg-paper-rgb: 6, 78, 59;
      --bg-secondary-rgb: 2, 44, 34;
      --accent-color: #4ade80;
      --accent-hover: #22c55e;
      --text-primary: #f0fdf4;
      --border-color: rgba(74, 222, 128, 0.1);
      --accent-muted: rgba(74, 222, 128, 0.08);
    }

    :root.theme-ocean {
      --bg-primary-rgb: 8, 47, 73;
      --bg-paper-rgb: 12, 74, 110;
      --bg-secondary-rgb: 7, 59, 76;
      --accent-color: #0ea5e9;
      --accent-hover: #0284c7;
      --text-primary: #f0f9ff;
      --border-color: rgba(14, 165, 233, 0.1);
      --accent-muted: rgba(14, 165, 233, 0.08);
    }

    /* Global Reset & Body Styles */
    * {
      transition:
        background-color 0.4s ease,
        border-color 0.4s ease,
        color 0.4s ease,
        transform 0.2s ease,
        box-shadow 0.4s ease;
    }

    body {
      font-family: var(--ui-font) !important;
      font-size: calc(16px * var(--ui-scale)) !important;
      letter-spacing: var(--ui-spacing) !important;
      line-height: var(--ui-line-height) !important;
      filter: saturate(var(--ui-saturation)) !important;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Compact Mode Adjustments */
    :root.compact-mode {
      --radius-premium: 10px;
      --sidebar-width: 280px;
    }

    .compact-mode .p-10 {
      padding: 1.5rem !important;
    }

    .compact-mode .p-8 {
      padding: 1.25rem !important;
    }

    .compact-mode .p-6 {
      padding: 0.85rem !important;
    }

    .compact-mode .p-5 {
      padding: 0.75rem !important;
    }

    .compact-mode .p-4 {
      padding: 0.65rem !important;
    }

    .compact-mode .py-8 {
      padding-top: 1.25rem !important;
      padding-bottom: 1.25rem !important;
    }

    .compact-mode .py-6 {
      padding-top: 1rem !important;
      padding-bottom: 1rem !important;
    }

    .compact-mode .rounded-3xl {
      border-radius: 1.25rem !important;
    }

    .compact-mode .rounded-2xl {
      border-radius: 1rem !important;
    }

    .compact-mode .rounded-xl {
      border-radius: 0.75rem !important;
    }

    .compact-mode .gap-6 {
      gap: 0.75rem !important;
    }

    /* Re-map dynamic tailwind variables to our theme tokens */
    :root {
      --c-zinc-50: var(--bg-primary);
      --c-zinc-100: var(--bg-secondary);
      --c-zinc-200: var(--border-color);
      --c-zinc-300: var(--border-color);
      --c-zinc-400: var(--text-muted);
      --c-zinc-500: var(--text-muted);
      --c-zinc-600: var(--text-secondary);
      --c-zinc-700: var(--text-secondary);
      --c-zinc-800: var(--bg-paper);
      --c-zinc-900: var(--bg-inset);
      --c-indigo-500: var(--accent-color);
      --c-indigo-600: var(--accent-hover);
      --c-indigo-700: var(--accent-hover);
    }

    /* Universal Mode Canvas Fix */
    .universal-mode-canvas .pedagogical-header {
      display: none !important;
    }

    /* ════════════════════════════════════════════════════════════ */
    /* CORPORATE WATERMARK (Filigran) */
    /* ════════════════════════════════════════════════════════════ */
    .worksheet-page {
      position: relative;
      overflow: hidden;
    }

    .worksheet-page::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      transform: translate(-50%, -50%) rotate(-15deg);
      background-image: url('/assets/logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
      /* İçeriğin hemen arkasında */
    }

    @media print {
      .worksheet-page::before {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* --- DİSLEKSİ DOSTU LOGO ANİMASYONU --- */
    @keyframes breathing-logo {

      0%,
      100% {
        transform: scale(1) translateY(0);
        filter: grayscale(0%) opacity(0.8);
      }

      50% {
        transform: scale(1.05) translateY(-5px);
        filter: grayscale(0%) opacity(1);
      }
    }

    .animate-breathing-logo {
      animation: breathing-logo 8s ease-in-out infinite;
    }

    @keyframes dyslexia-flip {
      0% {
        transform: rotateY(0deg);
        fill: currentColor;
      }

      15% {
        transform: rotateY(180deg);
        color: var(--accent-color);
      }

      45% {
        transform: rotateY(180deg);
        color: var(--accent-color);
      }

      60% {
        transform: rotateY(360deg);
        color: var(--text-primary);
      }

      100% {
        transform: rotateY(360deg);
        color: currentColor;
      }
    }

    .dyslexia-flip {
      display: inline-block;
      animation: dyslexia-flip 6s ease-in-out infinite;
      transform-style: preserve-3d;
      backface-visibility: visible;
    }

    @keyframes star-sparkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0.5);
      }

      50% {
        opacity: 0.8;
        transform: scale(1);
        filter: drop-shadow(0 0 5px white);
      }
    }

    .star-glow:hover {
      filter: drop-shadow(0 0 15px rgba(79, 70, 229, 0.3));
    }

    /* --- SIDEBAR & NAVIGATION PREMIUM EFFECTS --- */
    @keyframes menu-slide-in {
      from {
        opacity: 0;
        transform: translateX(-15px);
        filter: blur(4px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
        filter: blur(0);
      }
    }

    .animate-menu-in {
      animation: menu-slide-in 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(79, 70, 229, 0.4);
    }

    /* --- DYNAMIC WORKSHEET STRUCTURE --- */
    .worksheet-page {
      background-color: white;
      color: black;
      box-shadow:
        0 10px 30px -5px rgba(0, 0, 0, 0.1),
        0 4px 6px -2px rgba(0, 0, 0, 0.05);
      margin: 20px auto;
      width: 210mm;
      min-height: 297mm;
      padding: 15mm;
      position: relative;
      overflow: visible !important;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      border: 1px solid #e5e7eb;
      transition: transform 0.3s ease;
    }

    .worksheet-page:hover {
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
    }

    /* ════════════════════════════════════════════════════════════ */
    /* A4 ÇALIŞMA SAYFASI — TEMA İZOLASYONU                        */
    /* Tema (dark/light/space/nature vb.) ne olursa olsun,         */
    /* A4 çalışma sayfası her zaman beyaz, tertemiz kalır.         */
    /* ════════════════════════════════════════════════════════════ */
    .worksheet-page,
    .worksheet-page * {
      color-scheme: light !important;
      transition: none !important;
      /* Tema geçiş animasyonunu engelle */
    }

    /* CSS Değişkenlerini Light modun sabit değerlerine sıfırla.
         Tailwind zinc renkleri bu değişkenleri referans aldığından
         tema değişiminden tamamen muaf olurlar. */
    .worksheet-page {
      --c-zinc-50: #fafafa !important;
      --c-zinc-100: #f4f4f5 !important;
      --c-zinc-200: #e4e4e7 !important;
      --c-zinc-300: #d4d4d8 !important;
      --c-zinc-400: #a1a1aa !important;
      --c-zinc-500: #71717a !important;
      --c-zinc-600: #52525b !important;
      --c-zinc-700: #3f3f46 !important;
      --c-zinc-800: #27272a !important;
      --c-zinc-900: #18181b !important;
      --c-zinc-950: #09090b !important;
      --c-indigo-50: #eef2ff !important;
      --c-indigo-100: #e0e7ff !important;
      --c-indigo-200: #c7d2fe !important;
      --c-indigo-300: #a5b4fc !important;
      --c-indigo-400: #818cf8 !important;
      --c-indigo-500: #6366f1 !important;
      --c-indigo-600: #4f46e5 !important;
      --c-indigo-700: #4338ca !important;
      /* Arka plan ve metin rengi kesin override */
      background-color: white !important;
      color: black !important;
    }

    /* Sayfa Numarası (Sadece Ekranda) */
    .page-indicator-screen {
      position: absolute;
      top: -15px;
      right: 0;
      font-size: 10px;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
    }

    @media print {
      .page-indicator-screen {
        display: none !important;
      }
    }

    .break-inside-avoid {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* --- ULTRA PRINT ENGINE v4.2 — KUSURSUZ ÇOKLU SAYFA VE ÖLÇEKLENDİRME --- */
    @media print {
      @page {
        size: A4 portrait;
        margin: 0mm !important;
        /* Tarayıcı marjinlerini sıfırla, kontrolü CSS'e al */
      }

      /* 1. Asıl Arayüzü (Root) Tamamen Yok Et (Zemin Çakışmasını Önler) */
      #root {
        display: none !important;
        visibility: hidden !important;
        width: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        position: absolute !important;
      }

      html,
      body {
        background: white !important;
        margin: 0 !important;
        /* v5: Marjini sıfırla, kağıdı tam kapla */
        padding: 0 !important;
        height: auto !important;
        width: 100% !important;
        /* Tarayıcı genişliği %100 almalı */
        overflow: visible !important;
        display: block !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        position: relative !important;
      }

      /* 2. Print Container Artık Sayfanın Tek Hakimi (Relative Position ile doğal akar) */
      #print-container {
        display: block !important;
        visibility: visible !important;
        position: relative !important;
        /* <--- ABSOLUTE İPTAL (Çoklu Sayfa Donmasını Çözer) */
        width: 210mm !important;
        /* Kağıt genişliği */
        max-width: 210mm !important;
        margin: 0 auto !important;
        /* Mükemmel ortalama */
        background: white !important;
        z-index: 9999999 !important;
      }

      /* ═══════════════════════════════════════════
         SAYFA KONTEYNER — A4 Standart Mod
         A4 = 210mm x 297mm
      ═══════════════════════════════════════════ */
      .ultra-print-page,
      .worksheet-page {
        visibility: visible !important;
        display: block !important;
        width: 210mm !important;
        /* A4 Genişliğine Kilitli */
        min-height: 296mm !important;
        height: auto !important;
        padding: 10mm !important;
        /* Kullanıcı Talebi: Tam 1cm boşluk */
        margin: 0 auto !important;
        /* Merkeze hizala */
        overflow: visible !important;
        page-break-after: always !important;
        break-after: page !important;
        page-break-inside: auto !important;
        break-inside: auto !important;
        box-sizing: border-box !important;
        background: white !important;
        position: relative !important;
        border: none !important;
        box-shadow: none !important;
        transform: scale(1) !important;
        /* Her türlü skalayı sıfırla */
        zoom: 1 !important;
      }

      /* Yüksek flex yapıları blok moduna çevirerek sayfalama kırılmalarını engelle (çoklu sayfa desteği) */
      .worksheet-page>.flex-1,
      .worksheet-page>.flex-col {
        display: block !important;
        height: auto !important;
        min-height: 0 !important;
      }

      /* ═══════════════════════════════════════════
         KOMPAKT MOD — Daha fazla içerik sığdır
         #print-container.compact-print ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container.compact-print .ultra-print-page,
      #print-container.compact-print .worksheet-page {
        padding: 2mm 3mm !important;
        /* Çok daha dar boşluk - premium & ekonomik görünüm */
      }

      #print-container.compact-print .pedagogical-header h3 {
        font-size: 11pt !important;
        margin-bottom: 0mm !important;
      }

      #print-container.compact-print .pedagogical-header p.instruction {
        font-size: 9pt !important;
        line-height: 1.4 !important;
      }

      #print-container.compact-print .pedagogical-header p.note {
        font-size: 8pt !important;
      }

      #print-container.compact-print .block-text {
        font-size: 10pt !important;
        line-height: 1.5 !important;
      }

      #print-container.compact-print .print-content-area>* {
        margin-bottom: 4mm !important;
      }

      #print-container.compact-print .pedagogical-header {
        margin-bottom: 3mm !important;
        padding-bottom: 3mm !important;
      }

      /* ═══════════════════════════════════════════
         ÇİFT SÜTUN MOD
         #print-container.two-column-print ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container.two-column-print .print-content-area {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 5mm !important;
        align-items: start !important;
      }

      #print-container.two-column-print .print-content-area>* {
        margin-bottom: 0 !important;
      }

      #print-container.two-column-print .block-header,
      #print-container.two-column-print .pedagogical-header,
      #print-container.two-column-print .block-footer-val {
        /* Header ve footer tam genişlik alır */
        grid-column: 1 / -1 !important;
      }

      /* ═══════════════════════════════════════════
         FONT BOYUTU VARYANTLARI
         data-font-size attribute ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container[data-font-size='10'] .block-text,
      #print-container[data-font-size='10'] .block-cloze {
        font-size: 10pt !important;
      }

      #print-container[data-font-size='11'] .block-text,
      #print-container[data-font-size='11'] .block-cloze {
        font-size: 11pt !important;
      }

      #print-container[data-font-size='12'] .block-text,
      #print-container[data-font-size='12'] .block-cloze {
        font-size: 12pt !important;
        line-height: 1.8 !important;
      }

      /* ═══════════════════════════════════════════
         GRAYSKALE MOD
      ═══════════════════════════════════════════ */
      #print-container.grayscale-print * {
        filter: grayscale(100%) contrast(1.1) !important;
        -webkit-filter: grayscale(100%) contrast(1.1) !important;
      }

      /* ═══════════════════════════════════════════
         İÇERİK ALANI — Temel
      ═══════════════════════════════════════════ */
      .print-content-area {
        flex: 1 !important;
        display: block !important;
        width: 100% !important;
        overflow: visible !important;
      }

      .print-content-area>* {
        margin-bottom: 6mm !important;
      }

      /* ═══════════════════════════════════════════
         BÖLÜNME ÖNLEYİCİLER (PAGE BREAK ALGORİTMASI)
         Sayfa sınırına gelen resim, tablo ve soruların 
         ortadan ikiye yarılmasını KESİNLİKLE engeller.
      ═══════════════════════════════════════════ */
      .block-container,
      .pedagogical-header,
      .block-table-container,
      .block-grid-container,
      .block-match,
      .block-categorical,
      .block-cloze,
      .block-logic-card,
      .block-clue-card,
      .block-footer-val,
      /* Görsellerin/Canvas'ların yarısı üstte kalmasın */
      img,
      canvas,
      svg,
      .aspect-video,
      .aspect-square,
      /* Tablo satırları ve hücreleri yarılmasın */
      table,
      tr,
      th,
      td,
      thead,
      tbody {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* Sayfa başlıkları ve soruların kendilerinden sonra 
         gelen şıklar/metinlerle ayrılmasını önle */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .block-header,
      .font-bold {
        break-after: avoid !important;
        page-break-after: avoid !important;
      }

      /* ═══════════════════════════════════════════
         BLOK ÖZEL AYARLARI
      ═══════════════════════════════════════════ */
      .block-header {
        border-bottom-width: 3px !important;
        margin-bottom: 2mm !important;
      }

      .block-text {
        font-size: 11pt !important;
        line-height: 1.6 !important;
      }

      .block-grid-cell {
        width: 35px !important;
        height: 35px !important;
        font-size: 14pt !important;
      }

      .pedagogical-header {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* ═══════════════════════════════════════════
         YAPI ONARIMLARI — KARIŞIK VE BOZUK TABLO ÖNLEME
      ═══════════════════════════════════════════ */

      /* Sabit/Esnek yükseklikleri ez — A4 boyunca serbestçe aksın */
      .h-full,
      .h-screen,
      .min-h-\[500px\],
      .min-h-\[600px\],
      [style*="height: 100%"] {
        height: auto !important;
        min-height: 0 !important;
        max-height: none !important;
      }

      /* Yatay kaydırma sınıflarını ez — kesilmeleri önle */
      .overflow-x-auto,
      .overflow-y-auto,
      .overflow-auto,
      .overflow-hidden {
        overflow: visible !important;
      }

      /* Yazı Karakteri ve İç İçe Geçme Onarımı */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* SVG ve IZGARA KONTRAST ONARIMI */
      svg line,
      svg path,
      svg circle,
      svg rect {
        stroke-opacity: 1 !important;
        vector-effect: non-scaling-stroke !important;
      }

      /* Silik çıkan ızgaraları baskıda koyulaştır */
      [class*="border-zinc-100"],
      [class*="border-zinc-200"],
      [class*="stroke-zinc-100"],
      [class*="stroke-zinc-200"] {
        border-color: #94a3b8 !important;
        /* Baskıda görünür gri */
        stroke: #94a3b8 !important;
      }

      /* Tablo Kenarlıkları */
      table,
      th,
      td {
        border-color: #000000 !important;
        border-width: 1pt !important;
      }

      /* Görsel Silikleşmesini Önle */
      img,
      canvas {
        filter: none !important;
        -webkit-filter: none !important;
        image-rendering: -webkit-optimize-contrast !important;
      }

      /* Çakışan metinleri engellemek için satır yüksekliğini normalize et */
      p,
      span,
      div {
        line-height: normal !important;
      }

      .flex.overflow-x-auto {
        flex-wrap: wrap !important;
      }

      /* Responsive Gridlerin A4 sayfasında daralmasını/bozulmasını önle */
      /* A4 genişliği yeterli olduğundan MD breakpoint yapılarını zorunlu kıl */
      .md\:grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
      }

      .sm\:grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .sm\:grid-cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }

      /* ═══════════════════════════════════════════
         GİZLE / GÖSTER — Hassas Kurallar (TAMAMEN DOM'DAN YOK ET)
      ═══════════════════════════════════════════ */
      /* Sadece UI butonlarını gizle, print-keep olanları koru */
      button:not(.print-keep) {
        display: none !important;
        visibility: hidden !important;
        width: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .no-print,
      .edit-handle,
      .overlay-ui,
      .ui-panel,
      .print-toolbar,
      .print-controls,
      .page-navigator,
      .page-label-container,
      .fixed,
      .absolute.top-0:not(.worksheet-page .absolute),
      [class*='backdrop-blur'],
      [class*='animate-spin'],
      [class*='animate-bounce'],
      [class*='scroll-m'] {
        display: none !important;
        position: fixed !important;
        /* DOM akısında yeri kalmasın */
        top: -9999px !important;
      }

      /* Tailwind hover: ve focus: pseudo-class sınıflarını gizleme
         (Tailwind'in bu sınıfları @media print'te zaten etkisiz) */

      /* ═══════════════════════════════════════════
         SAYFA ALT BİLGİSİ VE TAŞMA ENGELLEYİCİLER
      ═══════════════════════════════════════════ */
      .print-footer,
      [class*='mt-auto'][class*='border-t'] {
        display: flex !important;
        visibility: visible !important;
        position: relative !important;
        width: 100% !important;
        break-inside: avoid !important;
      }

    }
