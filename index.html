
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['OpenDyslexic', 'sans-serif'],
          mono: ['OpenDyslexic', 'sans-serif'],
        },
        colors: {
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        }
      }
    }
  }
</script>
<style>
  /* Import OpenDyslexic font from a reliable CDN */
  @font-face {
    font-family: 'OpenDyslexic';
    src: url('https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic-regular.min.css') format('css'); 
    /* Fallback or alternative CDN if direct woff fails, using a common dyslexia font or just force local if available */
  }
  /* Using a direct link to a woff file from a stable repo for better reliability */
  @font-face {
      font-family: 'OpenDyslexic';
      font-style: normal;
      font-weight: normal;
      src: url('https://raw.githubusercontent.com/antijingoist/open-dyslexic/master/compiled/OpenDyslexic-Regular.woff') format('woff');
  }
  @font-face {
      font-family: 'OpenDyslexic';
      font-style: normal;
      font-weight: bold;
      src: url('https://raw.githubusercontent.com/antijingoist/open-dyslexic/master/compiled/OpenDyslexic-Bold.woff') format('woff');
  }
  @font-face {
      font-family: 'OpenDyslexic';
      font-style: italic;
      font-weight: normal;
      src: url('https://raw.githubusercontent.com/antijingoist/open-dyslexic/master/compiled/OpenDyslexic-Italic.woff') format('woff');
  }

  /* Force OpenDyslexic on all elements including form inputs */
  body, button, input, select, textarea, table, th, td, a, li, ul, ol, div, span, p, h1, h2, h3, h4, h5, h6, label, pre, code {
    font-family: 'OpenDyslexic', sans-serif !important;
  }

  @media print {
    @page {
      size: A4;
      margin: 20mm;
    }
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Hide everything by default */
    body * {
      visibility: hidden;
    }
    /* Only show the printable area and its children */
    .printable-area, .printable-area * {
      visibility: visible;
    }
    /* Position the printable area to take up the whole page */
    .printable-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0 !important;
    }
    
    .worksheet-page {
      break-inside: avoid;
      overflow: visible !important;
      box-shadow: none !important;
      border: none !important;
      padding: 0 !important;
    }

    .zoom-wrapper {
      transform: none !important;
      width: 100% !important;
      height: auto !important;
    }

    /* Watermark */
    .printable-area::after {
      content: 'Bursa Disleksi';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 100px;
      font-weight: bold;
      color: rgba(0, 0, 0, 0.08);
      z-index: -1;
      pointer-events: none;
    }
  }

  /* --- DARK THEME (Coffee) --- */
  html.dark body {
    background-color: #3d2c1d; /* Koyu Kahve */
    color: #d7ccc8; /* Açık Bej/Krem (Metin) */
  }
  html.dark .bg-white,
  html.dark .bg-zinc-50,
  html.dark .page {
    background-color: #f5efe6; /* Açık Kahve/Krem (Çalışma Sayfası) */
    color: #4e342e; /* Koyu Kahve (Metin) */
  }
  html.dark aside,
  html.dark header,
  html.dark .bg-zinc-100,
  html.dark .bg-zinc-800\/50 {
    background-color: #5d4037; /* Orta Kahve */
    color: #d7ccc8;
  }
  html.dark .bg-white\/80 {
     background-color: rgba(93, 64, 55, 0.8) !important;
  }
  html.dark .border,
  html.dark .border-zinc-200,
  html.dark .border-zinc-700,
  html.dark .border-zinc-800 {
    border-color: #4e342e !important;
  }
  html.dark .text-zinc-500, html.dark .text-zinc-400 { color: #bcaaa4 !important; }
  html.dark .text-zinc-900, html.dark .text-zinc-800, html.dark .text-zinc-700 { color: #f5efe6 !important; }
  html.dark .fill-zinc-900 { fill: #f5efe6; }
  
  /* Dark Theme Accents (Warm Orange/Amber) */
  html.dark .sidebar-activity-item-active {
    background-color: rgba(255, 167, 38, 0.15) !important;
    color: #ffca28 !important;
  }
  html.dark .sidebar-activity-item-active::before {
    background-color: #ffa726 !important;
  }
  html.dark .text-indigo-600, html.dark .text-indigo-400 { color: #ffb74d !important; }
  html.dark .hover\:text-indigo-500:hover { color: #ffca28 !important; }
  html.dark .focus-visible\:ring-indigo-500:focus-visible { --tw-ring-color: #ffa726 !important; }


  /* --- PASTEL THEME (Dyslexia Friendly) --- */
  html.theme-pastel body {
    background-color: #fdf6e3;
    color: #2c3e50;
  }
  html.theme-pastel .bg-white, 
  html.theme-pastel .bg-zinc-50, 
  html.theme-pastel .bg-zinc-100 {
    background-color: #fffdf5;
    color: #2c3e50;
  }
  html.theme-pastel .bg-zinc-200,
  html.theme-pastel .bg-zinc-300 {
    background-color: #eee8d5;
  }
  html.theme-pastel .text-zinc-500,
  html.theme-pastel .text-zinc-600 {
    color: #657b83;
  }
  html.theme-pastel .border-zinc-200,
  html.theme-pastel .border-zinc-300 {
    border-color: #d3cbb8;
  }

  /* --- SEPIA THEME --- */
  html.theme-sepia body {
    background-color: #f4ecd8; /* Sepia Arka Plan */
    color: #59452c; /* Koyu Kahve Metin */
  }
  html.theme-sepia .bg-white, 
  html.theme-sepia .bg-zinc-50, 
  html.theme-sepia .page {
    background-color: #faf6eb; /* Daha Açık Krem */
  }
  html.theme-sepia aside,
  html.theme-sepia header,
  html.theme-sepia .bg-zinc-100 {
    background-color: #e9dec7;
  }
   html.theme-sepia .bg-white\/80 {
     background-color: rgba(233, 222, 199, 0.8) !important;
  }
  html.theme-sepia .border-zinc-200,
  html.theme-sepia .border-zinc-700,
  html.theme-sepia .border-zinc-800 {
    border-color: #dcd0b8;
  }
  html.theme-sepia .text-zinc-500, html.theme-sepia .text-zinc-400 { color: #856f51; }
  html.theme-sepia .fill-zinc-900 { fill: #59452c; }
  html.theme-sepia .sidebar-activity-item-active {
    background-color: #F8F5EE !important;
    color: #8c6d46 !important;
  }
  html.theme-sepia .sidebar-activity-item-active::before {
    background-color: #a98962 !important;
  }
  html.theme-sepia .text-indigo-600 { color: #8c6d46 !important; }


  /* --- HIGH CONTRAST THEME --- */
  html.theme-contrast body {
    background-color: #000000;
    color: #FFFF00;
  }
  html.theme-contrast .bg-white,
  html.theme-contrast .bg-zinc-50,
  html.theme-contrast .bg-zinc-100,
  html.theme-contrast .bg-zinc-200,
  html.theme-contrast aside,
  html.theme-contrast header,
  html.theme-contrast .bg-white\/80 {
    background-color: #000000 !important;
    color: #FFFF00 !important;
    border-color: #FFFFFF !important;
  }
  html.theme-contrast .text-zinc-900,
  html.theme-contrast .text-zinc-800,
  html.theme-contrast .text-zinc-700,
  html.theme-contrast .text-zinc-600,
  html.theme-contrast .text-zinc-500 {
    color: #FFFF00 !important;
  }
  html.theme-contrast button {
    border: 2px solid #FFFFFF;
  }
  html.theme-contrast .border-zinc-200,
  html.theme-contrast .border-zinc-300,
  html.theme-contrast .border,
  html.theme-contrast input,
  html.theme-contrast select {
    border-color: #FFFFFF !important;
    color: #FFFF00 !important;
    background-color: #000000 !important;
  }
  html.theme-contrast .bg-indigo-50 {
    background-color: #000000 !important;
    border: 1px solid #FFFF00 !important;
  }
  html.theme-contrast .text-indigo-600, 
  html.theme-contrast .text-indigo-700 {
    color: #00FFFF !important; /* Cyan for links/highlights */
  }
  html.theme-contrast .bg-indigo-600 {
     background-color: #000000 !important;
     border: 2px solid #00FFFF !important;
     color: #00FFFF !important;
  }
  
  /* --- GENERAL UI ENHANCEMENTS & ANIMATIONS --- */
  button, a {
    transition: all 0.2s ease-in-out;
  }
  button:not(:disabled):hover, a:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
  }
  button:focus-visible, a:focus-visible {
    outline: 2px solid #6366F1;
    outline-offset: 2px;
    border-radius: 6px;
  }
  button:not(:disabled):active {
    transform: translateY(0px) scale(0.98);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
    50% { transform: translateY(-20px) rotate(5deg); opacity: 0.5; }
    100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
  }

  .fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
  
  /* --- SIDEBAR ACTIVE ITEM --- */
  .sidebar-activity-item-active {
      background-color: #EEF2FF !important; /* indigo-50 */
      color: #4338CA !important; /* indigo-700 */
      font-weight: 600;
      position: relative;
      overflow: hidden;
  }
  .sidebar-activity-item-active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      bottom: 10%;
      width: 4px;
      border-radius: 0 4px 4px 0;
      background-color: #6366F1; /* indigo-500 */
  }

</style>

{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",

  }
}
</script>
</head>
  <body class="bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
