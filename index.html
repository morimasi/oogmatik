<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:wght@400;600&family=Comic+Neue:wght@400;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- OpenDyslexic CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/open-dyslexic.css">

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['var(--ui-font)', 'sans-serif'],
          serif: ['var(--ui-font)', 'serif'],
          mono: ['var(--ui-font)', 'monospace'],
          dyslexic: ['OpenDyslexic', 'sans-serif']
        },
        colors: {
            brand: {
                50: '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
                950: '#451a03',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL VARIABLES (Base Anthracite Gold) --- */
  :root {
    --ui-font: 'OpenDyslexic';
    --ui-spacing: normal;
    --ui-scale: 1;
    --ui-line-height: 1.6;
    --ui-saturation: 100%;

    /* Default Theme: Anthracite & Gold */
    --bg-primary: #18181b; /* Zinc 900 */
    --bg-secondary: #27272a; /* Zinc 800 */
    --bg-paper: #27272a;
    --bg-inset: #3f3f46;
    --text-primary: #fbbf24; /* Amber 400 */
    --text-secondary: #d4d4d8; /* Zinc 300 */
    --text-muted: #a1a1aa;
    --border-color: #3f3f46;
    --panel-bg: rgba(39, 39, 42, 0.95);
    --pattern-color: rgba(251, 191, 36, 0.05); /* Gold dots */
    --accent-color: #f59e0b; /* Amber 500 */
  }

  /* 
     --- UNIVERSAL FONT ENFORCEMENT ---
  */
  :not(.fa):not(.fas):not(.far):not(.fal):not(.fab):not(.fa-solid):not(.fa-regular):not(.fa-brands):not(i) {
    font-family: var(--ui-font), sans-serif !important;
  }

  button, input, textarea, select, optgroup, label, ::placeholder {
      font-family: var(--ui-font), sans-serif !important;
  }

  body {
    font-size: calc(16px * var(--ui-scale));
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: background-color 0.4s ease, color 0.3s ease, border-color 0.3s ease;
    
    background-image: 
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px),
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
  }

  /* --- ICON PROTECTION --- */
  .fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands, i[class*="fa-"] {
      font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
      font-weight: 900; 
      font-style: normal;
      font-variant: normal;
      line-height: 1;
      text-rendering: auto;
  }
  .fa-brands, .fab { font-weight: 400; }
  .fa-regular, .far { font-weight: 400; }

  html {
      filter: saturate(var(--ui-saturation));
  }

  /* ==========================================================================
     THEME DEFINITIONS - ALL ANTHRACITE & GOLD VARIATIONS
     ========================================================================== */

  /* 1. KOYU / DARK (Zinc & Amber) */
  html.dark, .theme-dark {
      --bg-primary: #09090b; /* Zinc 950 */
      --bg-secondary: #18181b; /* Zinc 900 */
      --bg-paper: #18181b;
      --bg-inset: #27272a;
      --text-primary: #fbbf24; /* Amber 400 */
      --text-secondary: #e4e4e7;
      --text-muted: #71717a;
      --border-color: #27272a;
      --panel-bg: rgba(24, 24, 27, 0.95);
      --pattern-color: rgba(251, 191, 36, 0.05);
      --accent-color: #d97706;
  }

  /* 2. ANTRASİT (Slate & Gold) */
  .theme-anthracite {
      --bg-primary: #0f172a; /* Slate 900 */
      --bg-secondary: #1e293b; /* Slate 800 */
      --bg-paper: #1e293b;
      --bg-inset: #334155;
      --text-primary: #fcd34d; /* Amber 300 */
      --text-secondary: #e2e8f0;
      --text-muted: #64748b;
      --border-color: #334155;
      --panel-bg: rgba(30, 41, 59, 0.95);
      --pattern-color: rgba(252, 211, 77, 0.05);
      --accent-color: #f59e0b;
  }

  /* 3. ALTIN (Stone & Metallic Gold) */
  .theme-anthracite-gold {
      --bg-primary: #1c1917; /* Stone 900 */
      --bg-secondary: #292524; /* Stone 800 */
      --bg-paper: #292524;
      --bg-inset: #44403c;
      --text-primary: #ffd700; /* Pure Gold */
      --text-secondary: #e7e5e4;
      --text-muted: #78716c;
      --border-color: #44403c;
      --panel-bg: rgba(41, 37, 36, 0.95);
      --pattern-color: rgba(255, 215, 0, 0.08);
      --accent-color: #ca8a04;
  }

  /* 4. CYBER (Black & Neon Yellow) */
  .theme-anthracite-cyber {
      --bg-primary: #000000;
      --bg-secondary: #111111;
      --bg-paper: #0a0a0a;
      --bg-inset: #222222;
      --text-primary: #ffff00; /* Neon Yellow */
      --text-secondary: #fef08a;
      --text-muted: #666666;
      --border-color: #333333;
      --panel-bg: rgba(10, 10, 10, 0.95);
      --pattern-color: rgba(255, 255, 0, 0.1);
      --accent-color: #eab308;
  }

  /* 5. BUMBLEBEE (Zinc & Bright Yellow) */
  .theme-anthracite-bumblebee {
      --bg-primary: #18181b;
      --bg-secondary: #27272a;
      --bg-paper: #27272a;
      --bg-inset: #3f3f46;
      --text-primary: #facc15; /* Yellow 400 */
      --text-secondary: #fef9c3;
      --text-muted: #a1a1aa;
      --border-color: #3f3f46;
      --panel-bg: rgba(39, 39, 42, 0.95);
      --pattern-color: rgba(250, 204, 21, 0.08);
      --accent-color: #eab308;
  }

  /* 6. TAŞ (Neutral Gray & Pale Gold) */
  .theme-anthracite-stone {
      --bg-primary: #262626; /* Neutral 800 */
      --bg-secondary: #404040; /* Neutral 700 */
      --bg-paper: #404040;
      --bg-inset: #52525b;
      --text-primary: #fde68a; /* Amber 200 */
      --text-secondary: #d4d4d8;
      --text-muted: #a3a3a3;
      --border-color: #525252;
      --panel-bg: rgba(64, 64, 64, 0.95);
      --pattern-color: rgba(253, 230, 138, 0.05);
      --accent-color: #fbbf24;
  }

  /* 7. BAL (Warm Dark & Honey) */
  .theme-anthracite-honey {
      --bg-primary: #272320; /* Very Dark Brown/Grey */
      --bg-secondary: #3f3833;
      --bg-paper: #3f3833;
      --bg-inset: #595048;
      --text-primary: #ffedd5; /* Orange 100 */
      --text-secondary: #fbbf24; /* Amber 400 */
      --text-muted: #9a8478;
      --border-color: #595048;
      --panel-bg: rgba(63, 56, 51, 0.95);
      --pattern-color: rgba(251, 191, 36, 0.08);
      --accent-color: #d97706;
  }

  /* 8. ONİKS (Deepest Blue & Champagne) */
  .theme-anthracite-onyx {
      --bg-primary: #020617; /* Slate 950 */
      --bg-secondary: #0f172a; /* Slate 900 */
      --bg-paper: #0f172a;
      --bg-inset: #1e293b;
      --text-primary: #fef3c7; /* Amber 100 */
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: #1e293b;
      --panel-bg: rgba(15, 23, 42, 0.95);
      --pattern-color: rgba(254, 243, 199, 0.05);
      --accent-color: #b45309;
  }

  /* --- FORCED ANTHRACITE/GOLD OVERRIDES --- */
  
  /* Arkaplanlar */
  .bg-white, .bg-zinc-50, .bg-gray-50 { background-color: var(--bg-paper) !important; color: var(--text-primary) !important; }
  .bg-zinc-100, .bg-gray-100 { background-color: var(--bg-inset) !important; color: var(--text-secondary) !important; }
  .bg-zinc-800, .bg-zinc-900 { background-color: var(--bg-primary) !important; }
  
  /* Metin Renkleri - Her şeyi Gold/Sarı yap */
  .text-zinc-900, .text-gray-900, .text-slate-900 { color: var(--text-primary) !important; }
  .text-zinc-800, .text-gray-800, .text-slate-800 { color: var(--text-primary) !important; }
  .text-zinc-700, .text-gray-700, .text-slate-700 { color: var(--text-secondary) !important; }
  .text-zinc-600, .text-gray-600 { color: var(--text-secondary) !important; }
  .text-zinc-500, .text-gray-500 { color: var(--text-muted) !important; }
  
  /* Mavi/Indigo/Mor butonları Gold/Amber yap */
  .bg-indigo-600, .bg-blue-600, .bg-violet-600, .bg-emerald-600 {
      background-color: var(--accent-color) !important;
      color: #000000 !important; /* Gold üzeri siyah yazı daha okunur */
  }
  .bg-indigo-700, .bg-blue-700:hover, .bg-indigo-600:hover {
      background-color: #b45309 !important; /* Darker Amber on hover */
  }
  .text-indigo-600, .text-blue-600, .text-violet-600 {
      color: var(--text-primary) !important;
  }
  .bg-indigo-50, .bg-blue-50, .bg-emerald-50, .bg-rose-50, .bg-amber-50 {
      background-color: var(--bg-inset) !important;
      color: var(--text-primary) !important;
      border-color: var(--border-color) !important;
  }
  .bg-indigo-100, .bg-blue-100 {
      background-color: rgba(251, 191, 36, 0.2) !important; /* Transparent Gold */
      color: var(--text-primary) !important;
  }

  /* Kenarlıklar */
  .border-zinc-200, .border-gray-200, .border-zinc-300, .border-gray-300 {
      border-color: var(--border-color) !important;
  }

  /* UI Elements using Theme Variables */
  aside, header {
      background-color: var(--panel-bg) !important;
      border-color: var(--border-color) !important;
      color: var(--text-primary) !important;
      backdrop-filter: blur(12px);
  }

  *:focus-visible {
    outline: 3px solid var(--text-primary) !important;
    outline-offset: 2px !important;
    border-radius: 4px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background-color: var(--text-secondary); }

  /* --- WORKSHEET DYNAMICS (KAĞIT) --- */
  .worksheet-page .grid, .worksheet-page .flex, .worksheet-page .space-y-4 > * + * { gap: var(--worksheet-gap, 1rem) !important; }
  .worksheet-page .dynamic-grid { display: grid; grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important; gap: 1rem; }

  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); fill: var(--text-primary); }
    15% { transform: rotateY(180deg); fill: var(--accent-color); }
    100% { transform: rotateY(360deg); fill: var(--text-primary); }
  }
  .dyslexia-flip { animation: mixedFlip 8s infinite ease-in-out; display: inline-block; }

  /* --- PAPER SIMULATION (Protected White Area) --- */
  /* Ekranda kağıt hala beyaz görünmeli mi? Kullanıcı "Tüm temalar antrasit" dedi. 
     Kağıdın kendisi de koyu olsun, yazı gold olsun. Baskıda beyaza dönecek. */
  .worksheet-page {
      background-color: var(--bg-paper) !important;
      color: var(--text-primary) !important; 
      border: 1px solid var(--border-color) !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
  }
  
  /* Worksheet içindeki metinler de Gold */
  .worksheet-page .text-zinc-800, .worksheet-page .text-zinc-900 { color: var(--text-primary) !important; }
  .worksheet-page .bg-zinc-100 { background-color: var(--bg-inset) !important; }
  .worksheet-page .border-zinc-300 { border-color: var(--border-color) !important; }

  /* ==========================================================================
     PROFESSIONAL PRINT SYSTEM v2.0 (FORCE WHITE ON PAPER)
     ========================================================================== */
  @media print {
    @page { size: A4 portrait; margin: 1cm; }
    html, body, #root, main, .h-screen {
      height: auto !important; min-height: auto !important; overflow: visible !important;
      position: static !important; display: block !important; 
      background-color: white !important; color: black !important;
      margin: 0 !important; padding: 0 !important; width: 100% !important;
    }
    /* Baskıda tüm renkleri beyaza/siyaha zorla */
    * { 
        background-color: transparent !important; 
        color: black !important; 
        box-shadow: none !important; 
        text-shadow: none !important; 
        border-color: #000 !important;
    }
    
    header, aside, nav, .no-print, .print\:hidden, button:not(.worksheet-page button), .toolbar-container, .global-search, .modal-backdrop, .modal-close-btn, .toast-message { display: none !important; }
    
    .printable-area, .printable-area * { visibility: visible !important; }
    
    .worksheet-page { 
        background-color: white !important; 
        color: black !important; 
        border: none !important;
        margin: 0 0 20px 0 !important; 
        width: 100% !important; 
        break-after: page !important; 
        page-break-after: always !important; 
    }
    
    /* Semantic Colors for Print (If wanted, or just black) */
    .text-red-500, .text-rose-600 { color: #dc2626 !important; }
    .text-green-500, .text-emerald-600 { color: #16a34a !important; }
    .text-blue-500, .text-indigo-600 { color: #2563eb !important; }
    
    /* Restore borders for grids in print */
    .border, .border-2, .border-4 { border-color: #000 !important; }
  }

  /* --- UI ANIMATIONS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: var(--bg-inset) !important; 
      color: var(--text-primary) !important; 
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
      border-left: 4px solid var(--accent-color);
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>

  }
}
</script>
</head>
  <body class="antialiased transition-colors duration-300 overflow-hidden print:overflow-visible print:h-auto">
    <div id="root" class="h-screen flex flex-col print:h-auto print:block"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
