
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Print Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Regular.otf');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Bold.otf');
        font-weight: bold;
        font-style: normal;
      }

      :root {
        /* Default Theme (Anthracite Base) */
        --bg-primary: #222226;
        --bg-secondary: #1a1a1d;
        --bg-paper: #2d2d32;
        --bg-inset: #18181b;
        
        --panel-bg: rgba(45, 45, 50, 0.95);

        --text-primary: #fefce8;    
        --text-secondary: #d4d4d8;  
        --text-muted: #a1a1aa;      
        
        --border-color: #3f3f46;    
        
        --accent-color: #fbbf24;    /* Default Gold */
        --accent-hover: #f59e0b;    
        --pattern-color: #3f3f46;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
        --pattern-image: none;
      }

      /* --- THEME OVERRIDES --- */
      /* Light Theme */
      :root.theme-light {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --bg-paper: #ffffff;
        --bg-inset: #f1f5f9;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --accent-color: #4f46e5; /* Indigo */
        --accent-hover: #4338ca;
        --pattern-color: #e2e8f0;
      }

      /* Standard Dark Theme (Zinc) */
      :root.dark {
        --bg-primary: #18181b;
        --bg-secondary: #09090b;
        --bg-paper: #27272a;
        --bg-inset: #09090b;
        --panel-bg: rgba(39, 39, 42, 0.95);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border-color: #3f3f46;
        --accent-color: #818cf8; /* Indigo-400 */
        --accent-hover: #6366f1;
        --pattern-color: #27272a;
      }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-primary);
        background-image: var(--pattern-image);
        background-size: 550px 550px;
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; 
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-inset); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* Worksheet Texture & Edit Guides (Screen Only) */
      @media screen {
        .worksheet-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 1.4l2.83 2.83 1.41-1.41L1.41 0H0v1.41zM38.59 40l-2.83-2.83 1.41-1.41L40 38.59V40h-1.41zM40 1.41l-2.83 2.83-1.41-1.41L38.59 0H40v1.41zM20 18.6l2.83-2.83 1.41 1.41L21.41 20l2.83 2.83-1.41 1.41L20 21.41l-2.83 2.83-1.41-1.41L18.59 20l-2.83-2.83 1.41-1.41L20 18.59z'/%3E%3C/g%3E%3C/svg%3E");
        }
        
        .edit-grid-overlay {
            background-size: 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            pointer-events: none;
        }

        .print-safety-margin {
            border: 1px dashed rgba(239, 68, 68, 0.3); /* Red-400 equivalent */
            pointer-events: none;
        }
      }

      /* 
         --------------------------------------------------
         STRICT PRINT STYLES (PROFESSIONAL A4 LAYOUT)
         --------------------------------------------------
      */
      @media print {
        @page {
          margin: 0mm; /* Browser margins removed to handle custom margins via CSS */
          size: auto;  /* Allows content to define size */
        }
        
        /* Reset Body/Root for Print */
        :root, body {
            --bg-primary: #ffffff !important;
            --bg-paper: #ffffff !important;
            --text-primary: #000000 !important;
            background: white !important;
            color: black !important;
            width: 100% !important;
            height: auto !important;
            overflow: visible !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Hide UI */
        .no-print, header, aside, .tour-overlay, .sticky, nav, .fixed, button, .edit-handle, .edit-grid-overlay {
          display: none !important;
        }

        /* Layout & Spacing Enforcement */
        html, body, #root, main, .flex-1, .printable-content-parent {
            display: block !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            position: static !important;
            overflow: visible !important;
            transform: none !important; /* Remove zoom transforms */
        }

        /* FORCE DESKTOP LAYOUT OVERRIDES */
        /* Forces grids to stay multi-column even on narrow print viewports */
        .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
        .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
        .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
        
        .lg\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
        .lg\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
        .lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }

        .md\:flex-row { flex-direction: row !important; }
        .lg\:flex-row { flex-direction: row !important; }
        
        .md\:w-1\/2 { width: 50% !important; }
        .md\:w-1\/3 { width: 33.333333% !important; }
        .md\:w-2\/3 { width: 66.666667% !important; }
        .md\:w-1\/4 { width: 25% !important; }
        .md\:w-3\/4 { width: 75% !important; }

        .md\:gap-4 { gap: 1rem !important; }
        .md\:gap-6 { gap: 1.5rem !important; }
        .md\:gap-8 { gap: 2rem !important; }

        /* Force Flex/Grid Layouts to Maintain Structure */
        .flex { display: flex !important; }
        .flex-row { flex-direction: row !important; }
        .grid { display: grid !important; }
        
        /* Basic grids */
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)) !important; }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
        .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
        .grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
        
        /* Explicitly handle gap conversion for print (sometimes rems act up) */
        .gap-4 { gap: 1rem !important; }
        .gap-6 { gap: 1.5rem !important; }
        .gap-8 { gap: 2rem !important; }

        /* Page Break Logic */
        .worksheet-item, .worksheet-page, .print-page {
            break-after: page !important;
            page-break-after: always !important;
            width: 100% !important;
            max-width: 100% !important;
            box-shadow: none !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important; /* Padding handled by inner containers */
            background: white !important;
            display: block !important;
            position: relative !important;
            height: 100% !important; 
            overflow: visible !important;
        }

        .break-inside-avoid {
            break-inside: avoid !important;
            page-break-inside: avoid !important;
        }

        /* SVG & Graphics */
        svg {
            fill: white !important;
            stroke: black !important;
            max-width: 100% !important;
        }
        svg [fill]:not([fill="none"]):not([fill="white"]):not([fill="transparent"]) {
             fill: black !important;
             fill-opacity: 0.1 !important; /* Light gray for colors */
        }
        
        /* Specific Fixes */
        .worksheet-content {
            transform: none !important;
            width: 100% !important;
        }
    }

    /* Smart Column Utilities for Screen */
    .smart-grid {
        display: block; 
        gap: 1.5rem;
    }
    .columns-1 { column-count: 1; }
    .columns-2 { column-count: 2; column-gap: 2rem; }
    .columns-3 { column-count: 3; column-gap: 2rem; }
    .columns-4 { column-count: 4; column-gap: 1rem; }
    
    .smart-grid > * {
        break-inside: avoid;
        page-break-inside: avoid;
        margin-bottom: 1.5rem;
        display: inline-block; 
        width: 100%;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); }
    </style>
