<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oogmatik | Ultra Creative Studio</title>
  <meta name="description" content="Nöro-mimari ve özel eğitim için derinlikli materyal üretim merkezi." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Global Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --bg-primary: #222226;
      --bg-secondary: #1a1a1d;
      --bg-paper: #2d2d32;
      --bg-inset: #18181b;
      --panel-bg: rgba(45, 45, 50, 0.95);
      --text-primary: #fefce8;
      --text-secondary: #d4d4d8;
      --text-muted: #a1a1aa;
      --border-color: #3f3f46;
      --accent-color: #fbbf24;
      --accent-hover: #f59e0b;
      --pattern-color: #3f3f46;
      --ui-font: 'Lexend', 'OpenDyslexic', sans-serif;
      --ui-scale: 1;
      --ui-spacing: normal;
      --ui-line-height: 1.6;
      --ui-saturation: 100%;
      --pattern-image: none;
    }

    :root.theme-light {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-paper: #ffffff;
      --bg-inset: #f1f5f9;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --accent-color: #4f46e5;
      --accent-hover: #4338ca;
      --pattern-color: #e2e8f0;
    }

    :root.dark {
      --bg-primary: #18181b;
      --bg-secondary: #09090b;
      --bg-paper: #27272a;
      --bg-inset: #09090b;
      --panel-bg: rgba(39, 39, 42, 0.95);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-color: #3f3f46;
      --accent-color: #818cf8;
      --accent-hover: #6366f1;
      --pattern-color: #27272a;
    }

    body {
      font-family: var(--ui-font);
      font-size: calc(16px * var(--ui-scale));
      letter-spacing: var(--ui-spacing);
      line-height: var(--ui-line-height);
      background-color: var(--bg-primary);
      background-image: var(--pattern-image);
      background-size: 550px 550px;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Universal Mode Canvas Fix */
    .universal-mode-canvas .pedagogical-header {
      display: none !important;
    }

    /* ════════════════════════════════════════════════════════════ */
    /* CORPORATE WATERMARK (Filigran) */
    /* ════════════════════════════════════════════════════════════ */
    .worksheet-page {
      position: relative;
      overflow: hidden;
    }

    .worksheet-page::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      transform: translate(-50%, -50%) rotate(-15deg);
      background-image: url('/assets/logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
      /* İçeriğin hemen arkasında */
    }

    @media print {
      .worksheet-page::before {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* --- DİSLEKSİ DOSTU LOGO ANİMASYONU --- */
    @keyframes breathing-logo {

      0%,
      100% {
        transform: scale(1) translateY(0);
        filter: grayscale(100%) opacity(0.4);
      }

      50% {
        transform: scale(1.08) translateY(-10px);
        filter: grayscale(0%) opacity(0.8);
      }
    }

    .animate-breathing-logo {
      animation: breathing-logo 8s ease-in-out infinite;
    }

    /* --- DYNAMIC WORKSHEET STRUCTURE --- */
    .worksheet-page {
      background-color: white;
      color: black;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      margin: 0 auto;
      width: 210mm;
      min-height: 297mm;
      padding: 6mm;
      position: relative;
      overflow: visible !important;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .break-inside-avoid {
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* --- ULTRA PRINT ENGINE v4.0 — A4 KOMPAKT SİSTEM — Bursa Disleksi AI --- */
    @media print {
      @page {
        size: A4 portrait;
        margin: 0mm !important;
      }

      html,
      body {
        visibility: hidden;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
        overflow: visible !important;
      }

      #print-container {
        visibility: visible !important;
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        margin: 0 !important;
        background: white !important;
        z-index: 9999999 !important;
      }

      /* ═══════════════════════════════════════════
         SAYFA KONTEYNER — A4 Standart Mod
         A4 = 210mm x 297mm @ 96dpi = 794px x 1123px
      ═══════════════════════════════════════════ */
      .ultra-print-page,
      .worksheet-page {
        visibility: visible !important;
        display: flex !important;
        flex-direction: column !important;
        width: 210mm !important;
        min-height: 296mm !important;
        padding: 5mm 15mm !important;
        /* Standart padding azaltıldı, bileşen kontrolüne bırakıldı */
        margin: 0 auto !important;
        overflow: visible !important;
        page-break-after: always !important;
        break-after: page !important;
        box-sizing: border-box !important;
        background: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        position: relative !important;
        border: none !important;
        box-shadow: none !important;
      }

      /* Continuation sayfaları için fiziksel boşluk garantisi */
      .print-spacer {
        height: 15mm !important;
        display: block !important;
        width: 100% !important;
        clear: both !important;
      }

      /* ═══════════════════════════════════════════
         KOMPAKT MOD — Daha fazla içerik sığdır
         #print-container.compact-print ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container.compact-print .ultra-print-page,
      #print-container.compact-print .worksheet-page {
        padding: 7mm 11mm !important;
      }

      #print-container.compact-print .pedagogical-header h3 {
        font-size: 13pt !important;
        margin-bottom: 1mm !important;
      }

      #print-container.compact-print .pedagogical-header p.instruction {
        font-size: 9pt !important;
        line-height: 1.4 !important;
      }

      #print-container.compact-print .pedagogical-header p.note {
        font-size: 8pt !important;
      }

      #print-container.compact-print .block-text {
        font-size: 10pt !important;
        line-height: 1.5 !important;
      }

      #print-container.compact-print .print-content-area {
        gap: 4mm !important;
      }

      #print-container.compact-print .pedagogical-header {
        margin-bottom: 3mm !important;
        padding-bottom: 3mm !important;
      }

      /* ═══════════════════════════════════════════
         ÇİFT SÜTUN MOD
         #print-container.two-column-print ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container.two-column-print .print-content-area {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 5mm !important;
        align-items: start !important;
      }

      #print-container.two-column-print .block-header,
      #print-container.two-column-print .pedagogical-header,
      #print-container.two-column-print .block-footer-val {
        /* Header ve footer tam genişlik alır */
        grid-column: 1 / -1 !important;
      }

      /* ═══════════════════════════════════════════
         FONT BOYUTU VARYANTLARI
         data-font-size attribute ile etkinleşir
      ═══════════════════════════════════════════ */
      #print-container[data-font-size="10"] .block-text,
      #print-container[data-font-size="10"] .block-cloze {
        font-size: 10pt !important;
      }

      #print-container[data-font-size="11"] .block-text,
      #print-container[data-font-size="11"] .block-cloze {
        font-size: 11pt !important;
      }

      #print-container[data-font-size="12"] .block-text,
      #print-container[data-font-size="12"] .block-cloze {
        font-size: 12pt !important;
        line-height: 1.8 !important;
      }

      /* ═══════════════════════════════════════════
         GRAYSKALE MOD
      ═══════════════════════════════════════════ */
      #print-container.grayscale-print * {
        filter: grayscale(100%) contrast(1.1) !important;
        -webkit-filter: grayscale(100%) contrast(1.1) !important;
      }

      /* ═══════════════════════════════════════════
         İÇERİK ALANI — Temel
      ═══════════════════════════════════════════ */
      .print-content-area {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 6mm !important;
        width: 100% !important;
        overflow: visible !important;
      }

      /* Blokların sayfa ortasında kesilmesini önle */
      .block-container,
      .pedagogical-header,
      .block-table-container,
      .block-grid-container,
      .block-match,
      .block-categorical,
      .block-cloze,
      .block-logic-card,
      .block-clue-card,
      .block-footer-val {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        margin-bottom: 0 !important;
      }

      /* ═══════════════════════════════════════════
         BLOK ÖZEL AYARLARI
      ═══════════════════════════════════════════ */
      .block-header {
        border-bottom-width: 3px !important;
        margin-bottom: 2mm !important;
      }

      .block-text {
        font-size: 11pt !important;
        line-height: 1.6 !important;
      }

      .block-grid-cell {
        width: 35px !important;
        height: 35px !important;
        font-size: 14pt !important;
      }

      .pedagogical-header {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* ═══════════════════════════════════════════
         YAPI ONARIMLARI — KARIŞIK VE BOZUK TABLO ÖNLEME
      ═══════════════════════════════════════════ */

      /* Sabit/Esnek yükseklikleri ez — A4 boyunca serbestçe aksın */
      .h-full,
      .h-screen,
      .min-h-\[500px\],
      .min-h-\[600px\] {
        height: auto !important;
        min-height: 0 !important;
      }

      /* Yatay kaydırma sınıflarını ez — kesilmeleri önle */
      .overflow-x-auto,
      .overflow-y-auto,
      .overflow-auto,
      .overflow-hidden {
        overflow: visible !important;
      }

      /* Flex içindeki taşmaları wrap ile koru */
      .flex.overflow-x-auto {
        flex-wrap: wrap !important;
      }

      /* Responsive Gridlerin A4 sayfasında daralmasını/bozulmasını önle */
      /* A4 genişliği yeterli olduğundan MD breakpoint yapılarını zorunlu kıl */
      .md\:grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      }

      .md\:grid-cols-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
      }

      .sm\:grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .sm\:grid-cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }

      /* ═══════════════════════════════════════════
         GİZLE / GÖSTER — Hassas Kurallar
      ═══════════════════════════════════════════ */
      /* Sadece UI butonlarını gizle, print-keep olanları koru */
      button:not(.print-keep) {
        display: none !important;
      }

      .no-print,
      .edit-handle,
      .overlay-ui,
      .ui-panel,
      .print-toolbar,
      .print-controls,
      .page-navigator,
      .page-label-container,
      [class*="backdrop-blur"],
      [class*="animate-spin"],
      [class*="animate-bounce"],
      [class*="animate-pulse"] {
        display: none !important;
      }

      /* Tailwind hover: ve focus: pseudo-class sınıflarını gizleme
         (Tailwind'in bu sınıfları @media print'te zaten etkisiz) */

      /* ═══════════════════════════════════════════
         SAYFA ALT BİLGİSİ
      ═══════════════════════════════════════════ */
      .print-footer,
      [class*="mt-auto"][class*="border-t"] {
        display: flex !important;
        visibility: visible !important;
        position: relative !important;
        width: 100% !important;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "vite": "https://aistudiocdn.com/vite@^7.2.6",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
        "@vercel/node": "https://aistudiocdn.com/@vercel/node@^5.5.14",
        "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",

      }
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
