
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-bold.woff') format('woff');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-italic.woff') format('woff');
        font-weight: normal;
        font-style: italic;
        font-display: swap;
      }

      :root {
        /* Default Theme (Anthracite Base) */
        --bg-primary: #222226;
        --bg-secondary: #1a1a1d;
        --bg-paper: #2d2d32;
        --bg-inset: #18181b;
        --panel-bg: rgba(45, 45, 50, 0.95);
        --text-primary: #fefce8;    
        --text-secondary: #d4d4d8;  
        --text-muted: #a1a1aa;      
        --border-color: #3f3f46;    
        --accent-color: #fbbf24;
        --accent-hover: #f59e0b;    
        --pattern-color: #3f3f46;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
        --pattern-image: none;
      }

      /* Light Theme */
      :root.theme-light {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --bg-paper: #ffffff;
        --bg-inset: #f1f5f9;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --accent-color: #4f46e5;
        --accent-hover: #4338ca;
        --pattern-color: #e2e8f0;
      }

      /* Standard Dark Theme */
      :root.dark {
        --bg-primary: #18181b;
        --bg-secondary: #09090b;
        --bg-paper: #27272a;
        --bg-inset: #09090b;
        --panel-bg: rgba(39, 39, 42, 0.95);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border-color: #3f3f46;
        --accent-color: #818cf8;
        --accent-hover: #6366f1;
        --pattern-color: #27272a;
      }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-primary);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; /* App handles scrolling */
        touch-action: none; /* Prevent default touch actions for custom canvas handling */
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-inset); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 3px; }

      /* --- CANVAS & WORKSPACE STYLES --- */
      
      .canvas-viewport {
        background-color: #e5e5e5;
        /* Technical Dot Grid Pattern */
        background-image: radial-gradient(#9ca3af 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        cursor: grab;
      }
      
      .canvas-viewport:active {
        cursor: grabbing;
      }
      
      :root.dark .canvas-viewport {
        background-color: #18181b;
        background-image: radial-gradient(#3f3f46 1.5px, transparent 1.5px);
      }
      
      /* A4 Page Physical Appearance */
      .worksheet-page {
        background-color: white;
        color: black;
        box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2), 0 4px 10px -2px rgba(0, 0, 0, 0.1);
        width: 210mm;
        height: 297mm;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
        transform-origin: top center;
        transition: box-shadow 0.3s ease;
      }

      /* Edit Guides */
      .edit-grid-overlay {
          background-size: 20px 20px;
          background-image: 
              linear-gradient(to right, rgba(0, 100, 255, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(0, 100, 255, 0.05) 1px, transparent 1px);
          pointer-events: none;
      }

      .edit-safety-guide {
          border: 1px dashed rgba(239, 68, 68, 0.4); 
          pointer-events: none;
      }

      /* --- PRINT STYLES (CRITICAL OVERRIDES) --- */
      @media print {
        @page {
            size: A4;
            margin: 0;
        }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background: white !important;
            color: black !important;
            width: 100%;
            height: 100%;
            overflow: visible !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Hide all UI elements */
        #root > div {
           display: none !important;
        }

        /* The print container generated by printService */
        .print-container {
            display: block !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 99999 !important;
            background: white !important;
        }

        .print-page {
            display: block !important;
            width: 210mm !important;
            height: 297mm !important;
            margin: 0 !important;
            padding: 0 !important;
            page-break-after: always !important;
            break-after: page !important;
            box-shadow: none !important;
            border: none !important;
            position: relative !important;
            overflow: hidden !important;
            transform: none !important; /* Reset any canvas scaling */
            left: auto !important;
            top: auto !important;
        }
        
        .print-page:last-child {
            page-break-after: auto !important;
        }
        
        /* Ensure layout grids work in print */
        .print-page .grid { display: grid !important; }
        .print-page .flex { display: flex !important; }
        
        /* Clean up inputs */
        .print-page input, .print-page textarea {
            border: none !important;
            background: transparent !important;
            resize: none !important;
            padding: 0 !important;
        }
    }
    </style>
