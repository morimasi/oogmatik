
<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lora:wght@400;600&family=Comic+Neue:wght@400;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- OpenDyslexic CDN -->

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['var(--ui-font)', 'sans-serif'],
          serif: ['var(--ui-font)', 'serif'],
          mono: ['var(--ui-font)', 'monospace'],
          dyslexic: ['OpenDyslexic', 'sans-serif']
        },
        colors: {
            brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
            },
            zinc: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
                950: '#09090b',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL VARIABLES --- */
  :root {
    --ui-font: 'OpenDyslexic'; /* Default Force */
    --ui-spacing: normal;
    --ui-scale: 1;
    --ui-line-height: 1.6;
    --ui-saturation: 100%;

    /* Theme Defaults (Light - Zinc) */
    --bg-primary: #fafafa;
    --bg-secondary: #f4f4f5;
    --bg-paper: #ffffff;
    --bg-inset: #f4f4f5;
    --text-primary: #18181b;
    --text-secondary: #71717a;
    --text-muted: #a1a1aa;
    --border-color: #e4e4e7;
    --panel-bg: rgba(255, 255, 255, 0.85);
    --pattern-color: rgba(0,0,0,0.03);
  }

  /* 
     --- UNIVERSAL FONT ENFORCEMENT ---
     Applies to all elements except icons.
  */
  :not(.fa):not(.fas):not(.far):not(.fal):not(.fab):not(.fa-solid):not(.fa-regular):not(.fa-brands):not(i) {
    font-family: var(--ui-font), sans-serif !important;
  }

  /* Specifically target common form elements to override UA styles */
  button, input, textarea, select, optgroup, label, ::placeholder {
      font-family: var(--ui-font), sans-serif !important;
  }

  body {
    font-size: calc(16px * var(--ui-scale));
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: background-color 0.4s ease, color 0.3s ease;
    
    /* Subtle Texture: Dots */
    background-image: 
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px),
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
  }

  /* 
     --- ICON PROTECTION ---
  */
  .fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands, i[class*="fa-"] {
      font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
      font-weight: 900; 
      font-style: normal;
      font-variant: normal;
      line-height: 1;
      text-rendering: auto;
  }
  .fa-brands, .fab { font-weight: 400; }
  .fa-regular, .far { font-weight: 400; }

  /* --- IMAGE FILTERS --- */
  html {
      filter: saturate(var(--ui-saturation));
  }

  /* --- THEME DEFINITIONS --- */
  
  html.dark, .theme-dark {
      --bg-primary: #18181b;
      --bg-secondary: #27272a;
      --bg-paper: #27272a;
      --bg-inset: #202023;
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-color: #3f3f46;
      --panel-bg: rgba(39, 39, 42, 0.9);
      --pattern-color: rgba(255,255,255,0.02);
  }

  html.theme-anthracite, .theme-anthracite {
      --bg-primary: #222226;
      --bg-secondary: #303034;
      --bg-paper: #303034;
      --bg-inset: #38383c; 
      --text-primary: #ffffff; 
      --text-secondary: #FFD700;
      --text-muted: #b0b0b0;
      --border-color: #444448;
      --panel-bg: rgba(40, 40, 44, 0.95);
      --pattern-color: rgba(255, 199, 0, 0.04);
  }

  html.theme-anthracite-gold, .theme-anthracite-gold {
      --bg-primary: #1f1f22;
      --bg-secondary: #2d2d30;
      --bg-paper: #2d2d30;
      --bg-inset: #353538;
      --text-primary: #ffffff;
      --text-secondary: #FFC300;
      --text-muted: #b3ada2;
      --border-color: #4a4a4f;
      --panel-bg: rgba(35, 35, 38, 0.95);
      --pattern-color: rgba(255, 184, 0, 0.03);
  }
  
  html.theme-anthracite-cyber, .theme-anthracite-cyber {
      --bg-primary: #000000;
      --bg-secondary: #111111;
      --bg-paper: #111111;
      --bg-inset: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #F3FF00;
      --text-muted: #cccccc;
      --border-color: #F3FF00;
      --panel-bg: rgba(10, 10, 10, 0.9);
      --pattern-color: rgba(243, 255, 0, 0.05);
  }
  
  html.theme-anthracite-bumblebee, .theme-anthracite-bumblebee {
      --bg-primary: #2c2820;
      --bg-secondary: #3d3d41;
      --bg-paper: #3d3d41;
      --bg-inset: #454549;
      --text-primary: #ffffff;
      --text-secondary: #FFB700;
      --text-muted: #c0c0c0;
      --border-color: #FFB700;
      --panel-bg: rgba(44, 40, 32, 0.9);
      --pattern-color: rgba(255, 183, 0, 0.08);
  }

  html.theme-anthracite-stone, .theme-anthracite-stone {
      --bg-primary: #3d4043;
      --bg-secondary: #4a4d50;
      --bg-paper: #4a4d50;
      --bg-inset: #525558;
      --text-primary: #ffffff;
      --text-secondary: #ffc107;
      --text-muted: #a1a1aa;
      --border-color: #5c6063;
      --panel-bg: rgba(61, 64, 67, 0.95);
      --pattern-color: rgba(255, 193, 7, 0.04);
  }
  
  html.theme-anthracite-honey, .theme-anthracite-honey {
      --bg-primary: #38322f;
      --bg-secondary: #453e3a;
      --bg-paper: #453e3a;
      --bg-inset: #4d4642;
      --text-primary: #ffffff;
      --text-secondary: #ffab00;
      --text-muted: #b3a9a2;
      --border-color: #574f4a;
      --panel-bg: rgba(56, 50, 47, 0.95);
      --pattern-color: rgba(255, 171, 0, 0.04);
  }
  
  html.theme-anthracite-onyx, .theme-anthracite-onyx {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --bg-paper: #1e1e1e;
      --bg-inset: #262626;
      --text-primary: #ffffff;
      --text-secondary: #ffa000;
      --text-muted: #9e9e9e;
      --border-color: #424242;
      --panel-bg: rgba(18, 18, 18, 0.95);
      --pattern-color: rgba(255, 160, 0, 0.05);
  }

  /* UI Elements using Theme Variables */
  aside, header {
      background-color: var(--panel-bg) !important;
      border-color: var(--border-color) !important;
      color: var(--text-primary) !important;
      backdrop-filter: blur(12px);
  }

  /* Map Tailwind utilities to CSS Variables */
  .bg-white { background-color: var(--bg-paper) !important; }
  .bg-zinc-50 { background-color: var(--bg-secondary) !important; }
  .border-zinc-200, .border-zinc-100 { border-color: var(--border-color) !important; }
  .text-zinc-900, .text-zinc-800 { color: var(--text-primary) !important; }
  .text-zinc-600, .text-zinc-500, .text-zinc-400 { color: var(--text-secondary) !important; }
  
  /* --- ANTHRACITE THEME BUTTON OVERRIDE --- */
  html[class*="theme-anthracite"] .bg-indigo-600,
  html[class*="theme-anthracite"] .from-violet-600 {
      background-image: none !important;
      background-color: var(--text-secondary) !important;
      color: var(--bg-primary) !important;
  }
  html[class*="theme-anthracite"] .hover\:bg-indigo-700:hover {
      filter: brightness(1.1);
  }
  html[class*="theme-anthracite"] .sidebar-activity-item-active { 
      background-color: var(--panel-bg) !important;
      color: var(--text-secondary) !important;
  }

  /* Special handling for dark/theme mode specific utility classes */
  html.dark .dark\:bg-zinc-800, 
  [class*="theme-"] .dark\:bg-zinc-800 { 
      background-color: var(--bg-paper) !important; 
  }
  html.dark .dark\:border-zinc-700,
  [class*="theme-"] .dark\:border-zinc-700 {
      border-color: var(--border-color) !important;
  }

  /* --- ACCESSIBILITY: HIGH CONTRAST FOCUS RINGS --- */
  *:focus-visible {
    outline: 3px solid #4f46e5 !important;
    outline-offset: 2px !important;
    border-radius: 4px;
  }
  html.dark *:focus-visible, [class*="theme-"] *:focus-visible {
    outline-color: var(--text-secondary) !important;
  }

  /* --- CUSTOM SCROLLBARS --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background-color: var(--border-color);
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: var(--text-secondary);
  }

  /* --- WORKSHEET DYNAMICS --- */
  .worksheet-page .grid, 
  .worksheet-page .flex,
  .worksheet-page .space-y-4 > * + *,
  .worksheet-page .space-y-6 > * + *,
  .worksheet-page .space-y-8 > * + *,
  .worksheet-page .gap-4,
  .worksheet-page .gap-6,
  .worksheet-page .gap-8 {
      gap: var(--worksheet-gap, 1rem) !important;
  }

  .worksheet-page .dynamic-grid {
      display: grid;
      grid-template-columns: repeat(var(--dynamic-cols, 1), minmax(0, 1fr)) !important;
      gap: 1rem;
  }

  /* --- ANIMATIONS --- */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); }
    15% { transform: rotateY(180deg); }
    45% { transform: rotateY(180deg); }
    60% { transform: rotateY(360deg); }
    100% { transform: rotateY(360deg); }
  }

  .dyslexia-flip {
    animation-name: mixedFlip;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
    transform-box: fill-box;
    transform-origin: center;
    display: inline-block;
  }
  
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
  }

  /* --- PAPER SIMULATION (The Protected Area) --- */
  .worksheet-page {
      background-color: #ffffff !important;
      
      /* Reset all theme variables to their "light mode" defaults */
      --bg-primary: #fafafa !important;
      --bg-secondary: #f4f4f5 !important;
      --bg-paper: #ffffff !important;
      --panel-bg: rgba(255, 255, 255, 0.85) !important;
      --text-primary: #18181b !important;
      --text-secondary: #71717a !important;
      --text-muted: #a1a1aa !important;
      --border-color: #e4e4e7 !important;
      
      color: #18181b !important; 

      letter-spacing: normal !important; 
      line-height: 1.5 !important;
      font-size: 1rem !important; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05) !important;
      transition: box-shadow 0.3s ease;
  }
  
  /* Fallback text color for worksheet components */
  .worksheet-page h1, .worksheet-page h2, .worksheet-page h3, .worksheet-page h4, 
  .worksheet-page h5, .worksheet-page h6, .worksheet-page p, .worksheet-page span, 
  .worksheet-page li, .worksheet-page div {
      color: var(--text-primary); 
  }

  @media screen {
      .worksheet-page:hover {
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.05) !important;
      }
  }
  
  /* Worksheet components overrides */
  .worksheet-page input, 
  .worksheet-page textarea {
      background-color: #ffffff !important;
      border-color: #d4d4d8 !important;
      color: #18181b !important;
  }
  
  /* Semantic Colors */
  .worksheet-page .text-indigo-600 { color: #4f46e5 !important; }
  .worksheet-page .text-emerald-600 { color: #059669 !important; }
  .worksheet-page .text-amber-600 { color: #d97706 !important; }
  .worksheet-page .text-rose-600 { color: #e11d48 !important; }
  .worksheet-page .bg-indigo-100 { background-color: #e0e7ff !important; }
  
  /* --- PRINT STYLES --- */
  @media print {
    @page { size: A4 portrait; margin: 10mm; }
    
    html, body { 
      width: 100%; 
      height: 100% !important; 
      margin: 0 !important;
      padding: 0 !important;
      background-color: white !important; 
      color: black !important; 
      -webkit-print-color-adjust: exact !important; 
      print-color-adjust: exact !important; 
      font-size: 11pt !important;
      overflow: visible !important;
    }
    
    /* Global Hide */
    #root > *, header, aside, #tour-toolbar, .tour-overlay, button, .tour-highlight, .no-print, #tour-sidebar, .reading-ruler { 
        display: none !important; 
    }
    
    /* --- WORKSHEET PRINTING --- */
    /* Only show content area if it's the target */
    .printable-area, .printable-document { 
        display: block !important; 
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        margin: 0;
        padding: 0;
    }

    .worksheet-page { 
        width: 100% !important; 
        max-width: none !important; 
        margin: 0 !important; 
        padding: 0 !important;
        border: none !important; 
        box-shadow: none !important; 
        page-break-after: always !important;
        break-after: page !important;
        break-inside: avoid !important;
    }
    
    .worksheet-page:last-child { 
        page-break-after: auto !important;
    }

    /* --- REPORT PRINTING --- */
    /* Only show report container if it exists */
    .assessment-report-container {
      display: block !important;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      box-shadow: none !important;
      background-color: white !important;
      color: black !important;
      overflow: visible !important;
      z-index: 9999;
    }

    /* Report specific resets */
    .assessment-report-container * {
        color: black !important;
        background-color: transparent !important;
        border-color: #ccc !important;
        box-shadow: none !important;
    }
    
    /* Ensure elements don't split weirdly */
    .break-inside-avoid {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }
    
    /* Restore some visual structure for report charts/tables */
    .assessment-report-container .bg-indigo-50,
    .assessment-report-container .bg-green-50,
    .assessment-report-container .bg-rose-50,
    .assessment-report-container .bg-zinc-800 {
        background-color: #f9fafb !important;
        border: 1px solid #e5e7eb !important;
    }
    
    img { max-height: 150px !important; }
  }

  /* --- UI ENHANCEMENTS --- */
  button, a { transition: all 0.2s ease-in-out; }
  button:not(:disabled):hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(0) scale(0.98); }
  
  .sidebar-activity-item-active { 
      background-color: #e0e7ff; 
      color: #4338ca; 
      font-weight: 600; 
      position: relative; 
      overflow: hidden; 
  }
  html:not(.dark):not([class*="theme-"]) .sidebar-activity-item-active {
      background-color: rgba(99, 102, 241, 0.1);
  }
  .sidebar-activity-item-active::before { 
      content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; 
      border-radius: 0 4px 4px 0; background-color: currentColor; 
  }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* --- SIDEBAR ACTIVITY LIST CUSTOMIZATION --- */
  html[class*="theme-anthracite"] .sidebar-activity-list {
      background-color: var(--bg-inset) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
  }
</style>
