
<!DOCTYPE html>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:wght@400;600&family=Comic+Neue:wght@400;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- OpenDyslexic CDN -->

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['var(--ui-font)', 'sans-serif'],
          serif: ['var(--ui-font)', 'serif'],
          mono: ['var(--ui-font)', 'monospace'],
          dyslexic: ['OpenDyslexic', 'sans-serif']
        },
        colors: {
            brand: {
                50: '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
                950: '#451a03',
            }
        },
        boxShadow: {
            'paper': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
            'paper-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255,255,255,0.05)',
        }
      }
    }
  }
</script>
<style>
  /* --- GLOBAL VARIABLES --- */
  :root {
    --ui-font: 'OpenDyslexic';
    --ui-spacing: normal;
    --ui-scale: 1;
    --ui-line-height: 1.6;
    --ui-saturation: 100%;

    /* DEFAULT ANTHRACITE & GOLD (Professional Warm Dark) */
    --bg-primary: #1c1917; /* Stone 900 - Warm dark grey */
    --bg-secondary: #292524; /* Stone 800 */
    --bg-paper: #292524; /* Cards */
    --bg-inset: #44403c; /* Inputs */
    --text-primary: #fbbf24; /* Amber 400 - Gold Text */
    --text-secondary: #f5f5f4; /* Stone 100 - White text */
    --text-muted: #a8a29e; /* Stone 400 */
    --border-color: #57534e; /* Stone 600 */
    --panel-bg: rgba(28, 25, 23, 0.95); /* Transparent Stone */
    --pattern-color: rgba(251, 191, 36, 0.05); /* Gold dots */
    --accent-color: #f59e0b; /* Amber 500 */
    --accent-hover: #d97706; /* Amber 600 */
  }

  /* 
     --- UNIVERSAL FONT ENFORCEMENT ---
  */
  :not(.fa):not(.fas):not(.far):not(.fal):not(.fab):not(.fa-solid):not(.fa-regular):not(.fa-brands):not(i) {
    font-family: var(--ui-font), sans-serif !important;
  }

  button, input, textarea, select, optgroup, label, ::placeholder {
      font-family: var(--ui-font), sans-serif !important;
  }

  body {
    font-size: calc(16px * var(--ui-scale));
    background-color: var(--bg-primary);
    color: var(--text-secondary); /* Default text white for readability */
    transition: background-color 0.4s ease, color 0.3s ease, border-color 0.3s ease;
    
    background-image: 
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px),
        radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
  }

  /* --- ICON PROTECTION --- */
  .fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands, i[class*="fa-"] {
      font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
      font-weight: 900; 
      font-style: normal;
      font-variant: normal;
      line-height: 1;
      text-rendering: auto;
  }
  .fa-brands, .fab { font-weight: 400; }
  .fa-regular, .far { font-weight: 400; }

  html {
      filter: saturate(var(--ui-saturation));
  }

  /* ==========================================================================
     THEME DEFINITIONS - ALL ANTHRACITE & GOLD VARIATIONS
     ========================================================================== */

  /* 1. KOYU / DARK (Zinc & Gold) */
  html.dark, .theme-dark {
      --bg-primary: #09090b; /* Zinc 950 */
      --bg-secondary: #18181b; /* Zinc 900 */
      --bg-paper: #18181b;
      --bg-inset: #27272a;
      --text-primary: #fcd34d; /* Amber 300 */
      --text-secondary: #fafafa; 
      --text-muted: #a1a1aa;
      --border-color: #3f3f46;
      --panel-bg: rgba(24, 24, 27, 0.95);
      --pattern-color: rgba(252, 211, 77, 0.05);
      --accent-color: #f59e0b;
  }

  /* 2. ANTRASİT (Stone & Amber) - Default */
  .theme-anthracite {
      /* Uses Root variables */
  }

  /* 3. ALTIN (Pure Black & Metallic Gold) */
  .theme-anthracite-gold {
      --bg-primary: #000000;
      --bg-secondary: #111111;
      --bg-paper: #0a0a0a;
      --bg-inset: #262626;
      --text-primary: #ffd700; /* Pure Gold */
      --text-secondary: #ffffff;
      --text-muted: #737373;
      --border-color: #404040;
      --panel-bg: rgba(10, 10, 10, 0.98);
      --pattern-color: rgba(255, 215, 0, 0.1);
      --accent-color: #ffd700;
      --accent-hover: #eab308;
  }

  /* 4. CYBER (Dark Grey & Neon Yellow) */
  .theme-anthracite-cyber {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --bg-paper: #1e1e1e;
      --bg-inset: #2d2d2d;
      --text-primary: #faff00; /* Neon Yellow */
      --text-secondary: #ffffff;
      --text-muted: #a3a3a3;
      --border-color: #333333;
      --panel-bg: rgba(30, 30, 30, 0.95);
      --pattern-color: rgba(250, 255, 0, 0.08);
      --accent-color: #facc15;
  }

  /* 5. BUMBLEBEE (Charcoal & Bright Yellow) */
  .theme-anthracite-bumblebee {
      --bg-primary: #1f2937; /* Gray 800 */
      --bg-secondary: #374151; /* Gray 700 */
      --bg-paper: #374151;
      --bg-inset: #4b5563;
      --text-primary: #fde047; /* Yellow 300 */
      --text-secondary: #f9fafb;
      --text-muted: #9ca3af;
      --border-color: #4b5563;
      --panel-bg: rgba(55, 65, 81, 0.95);
      --pattern-color: rgba(253, 224, 71, 0.08);
      --accent-color: #eab308;
  }

  /* 6. TAŞ (Neutral Grey & Pale Gold) */
  .theme-anthracite-stone {
      --bg-primary: #262626; /* Neutral 800 */
      --bg-secondary: #404040; /* Neutral 700 */
      --bg-paper: #404040;
      --bg-inset: #52525b;
      --text-primary: #fde68a; /* Amber 200 */
      --text-secondary: #f5f5f5;
      --text-muted: #d4d4d4;
      --border-color: #525252;
      --panel-bg: rgba(64, 64, 64, 0.95);
      --pattern-color: rgba(253, 230, 138, 0.06);
      --accent-color: #fbbf24;
  }

  /* 7. BAL (Dark Brown & Honey) */
  .theme-anthracite-honey {
      --bg-primary: #19120e; /* Very dark warm brown */
      --bg-secondary: #271c19;
      --bg-paper: #271c19;
      --bg-inset: #43302b;
      --text-primary: #fbbf24; /* Amber 400 */
      --text-secondary: #fff7ed; /* Orange 50 */
      --text-muted: #a8a29e;
      --border-color: #574540;
      --panel-bg: rgba(39, 28, 25, 0.95);
      --pattern-color: rgba(251, 191, 36, 0.08);
      --accent-color: #d97706;
  }

  /* 8. ONİKS (Deep Slate & Champagne) */
  .theme-anthracite-onyx {
      --bg-primary: #0f172a; /* Slate 900 */
      --bg-secondary: #1e293b; /* Slate 800 */
      --bg-paper: #1e293b;
      --bg-inset: #334155;
      --text-primary: #fcd34d; /* Amber 300 */
      --text-secondary: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --panel-bg: rgba(30, 41, 59, 0.95);
      --pattern-color: rgba(252, 211, 77, 0.06);
      --accent-color: #fbbf24;
  }

  /* 
     --- CSS OVERRIDES FOR TAILWIND CLASSES --- 
     Forces specific Tailwind classes to use our variables for global consistency.
  */
  
  /* Backgrounds */
  .bg-white, .bg-zinc-50, .bg-gray-50, .bg-slate-50 { 
      background-color: var(--bg-paper) !important; 
      color: var(--text-secondary) !important; 
      border-color: var(--border-color) !important;
  }
  .bg-zinc-100, .bg-gray-100, .bg-slate-100, .bg-zinc-50\/50, .bg-zinc-100\/50 { 
      background-color: var(--bg-inset) !important; 
      color: var(--text-secondary) !important; 
  }
  .bg-zinc-800, .bg-zinc-900, .dark\:bg-zinc-800 {
      background-color: var(--bg-secondary) !important;
  }

  /* Text Colors */
  .text-zinc-900, .text-gray-900, .text-slate-900, .text-black, .dark\:text-white, .dark\:text-zinc-100 { 
      color: var(--text-primary) !important; 
  }
  .text-zinc-800, .text-gray-800, .text-zinc-700, .text-gray-700 { 
      color: var(--text-secondary) !important; 
  }
  .text-zinc-600, .text-zinc-500, .text-gray-600, .text-gray-500 { 
      color: var(--text-muted) !important; 
  }
  .text-indigo-600, .text-blue-600, .text-violet-600, .dark\:text-indigo-400 {
      color: var(--text-primary) !important; /* Make links/highlights Gold */
  }

  /* Borders */
  .border-zinc-200, .border-gray-200, .border-zinc-300, .border-zinc-100, .dark\:border-zinc-700 {
      border-color: var(--border-color) !important;
  }

  /* Buttons & Accents - Force Gold/Amber */
  .bg-indigo-600, .bg-blue-600, .bg-violet-600, .bg-emerald-600, .bg-zinc-900, .bg-zinc-800 {
      background-color: var(--accent-color) !important;
      color: #000000 !important; /* Black text on Gold button for contrast */
      font-weight: 700 !important;
  }
  .bg-indigo-600:hover, .bg-blue-600:hover {
      background-color: var(--accent-hover) !important;
  }
  
  /* Light Accents (e.g. bg-indigo-50) -> Darker Inset with Gold Border */
  .bg-indigo-50, .bg-blue-50, .bg-emerald-50, .bg-rose-50, .bg-amber-50, .bg-sky-50 {
      background-color: var(--bg-inset) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border-color) !important;
  }
  
  /* Specific Icons */
  .text-indigo-500, .text-blue-500, .text-green-500 {
      color: var(--accent-color) !important;
  }

  /* UI Structure */
  aside, header {
      background-color: var(--panel-bg) !important;
      border-color: var(--border-color) !important;
      backdrop-filter: blur(12px);
  }

  *:focus-visible {
    outline: 2px solid var(--text-primary) !important;
    outline-offset: 2px !important;
    border-radius: 4px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background-color: var(--accent-color); }

  /* Worksheet Preview (On Screen) */
  .worksheet-page {
      background-color: var(--bg-paper) !important;
      color: var(--text-secondary) !important;
      border: 1px solid var(--border-color) !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
  }
  
  /* Animations */
  @keyframes mixedFlip {
    0% { transform: rotateY(0deg); fill: var(--text-primary); }
    50% { transform: rotateY(180deg); fill: var(--accent-color); }
    100% { transform: rotateY(360deg); fill: var(--text-primary); }
  }
  .dyslexia-flip { animation: mixedFlip 8s infinite ease-in-out; display: inline-block; }
  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* ==========================================================================
     PROFESSIONAL PRINT SYSTEM v3.0 (CLEAN & WYSIWYG)
     ========================================================================== */
  @media print {
    @page { 
        size: A4 portrait; 
        margin: 1cm; 
    }
    
    /* Reset Root */
    html, body, #root {
      height: auto !important; 
      min-height: auto !important; 
      overflow: visible !important;
      position: static !important; 
      display: block !important; 
      background-color: white !important; 
      color: black !important;
      margin: 0 !important; 
      padding: 0 !important; 
      width: 100% !important;
      font-size: 12pt !important; /* Standard print size */
    }

    /* Force Color Accuracy */
    * { 
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important; 
        box-shadow: none !important; 
        text-shadow: none !important; 
    }

    /* Hide UI Elements */
    header, aside, nav, 
    .no-print, .print\:hidden, 
    button:not(.worksheet-page button), /* Hide buttons unless they are part of content (rare) */
    .toolbar-container, 
    .global-search, 
    .modal-close-btn, 
    .toast-message,
    .tour-overlay,
    .fixed { 
        display: none !important; 
    }
    
    /* Reveal Content */
    .printable-area, .printable-content, .printable-content-parent { 
        visibility: visible !important; 
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        opacity: 1 !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    /* Worksheet Page Formatting */
    .worksheet-page { 
        background-color: white !important; 
        color: black !important; 
        border: none !important;
        margin: 0 0 0 0 !important; 
        padding: 0 !important;
        width: 100% !important; 
        min-height: auto !important;
        page-break-after: always !important; 
        break-after: page !important; 
        box-shadow: none !important;
    }
    
    /* Content Within Worksheet */
    .worksheet-page * {
        color: black !important;
        border-color: #000 !important; /* Force black borders */
    }
    
    /* Ensure Grid/Flex Layouts Print Correctly */
    .grid, .flex {
        display: grid !important; /* or flex, keep original display */
        break-inside: avoid !important;
    }
    
    /* Remove Dark Mode Effects for Print */
    .bg-zinc-800, .bg-zinc-900, .bg-black {
        background-color: transparent !important;
        color: black !important;
    }
    .text-white, .text-zinc-200 {
        color: black !important;
    }
    
    /* Fix Modal Printing (Assessment Report) */
    .fixed.inset-0 {
        position: static !important;
        background: none !important;
        display: block !important;
    }
    .printable-content {
        max-width: 100% !important;
        max-height: none !important;
        border: none !important;
        box-shadow: none !important;
    }
  }
</style>
