
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bursa Disleksi Ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Global Print Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@400;600;800&family=Lexend:wght@400;600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
      
      /* OpenDyslexic Font Face */
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Regular.otf');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('https://cdn.jsdelivr.net/npm/opendyslexic@2.1.0/opentype/OpenDyslexic-Bold.otf');
        font-weight: bold;
        font-style: normal;
      }

      :root {
        /* Default Theme (Anthracite Base) */
        --bg-primary: #222226;
        --bg-secondary: #1a1a1d;
        --bg-paper: #2d2d32;
        --bg-inset: #18181b;
        
        --panel-bg: rgba(45, 45, 50, 0.95);

        --text-primary: #fefce8;    
        --text-secondary: #d4d4d8;  
        --text-muted: #a1a1aa;      
        
        --border-color: #3f3f46;    
        
        --accent-color: #fbbf24;    /* Default Gold */
        --accent-hover: #f59e0b;    
        --pattern-color: #3f3f46;
        
        --ui-font: 'OpenDyslexic', sans-serif;
        --ui-scale: 1;
        --ui-spacing: normal;
        --ui-line-height: 1.6;
        --ui-saturation: 100%;
        --pattern-image: none;
      }

      /* --- THEME OVERRIDES --- */

      /* Light Theme */
      :root.theme-light {
        --bg-primary: #f8fafc;
        --bg-secondary: #f1f5f9;
        --bg-paper: #ffffff;
        --bg-inset: #f1f5f9;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --border-color: #e2e8f0;
        --accent-color: #4f46e5; /* Indigo */
        --accent-hover: #4338ca;
        --pattern-color: #e2e8f0;
      }

      /* Standard Dark Theme (Zinc) */
      :root.dark {
        --bg-primary: #18181b;
        --bg-secondary: #09090b;
        --bg-paper: #27272a;
        --bg-inset: #09090b;
        --panel-bg: rgba(39, 39, 42, 0.95);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border-color: #3f3f46;
        --accent-color: #818cf8; /* Indigo-400 */
        --accent-hover: #6366f1;
        --pattern-color: #27272a;
      }

      /* --- CONCEPT THEMES --- */

      /* Space Theme */
      :root.theme-space {
        --bg-primary: #0b0d17;
        --bg-secondary: #151932;
        --bg-paper: #1c2142;
        --bg-inset: #0f1221;
        --panel-bg: rgba(28, 33, 66, 0.95);
        --text-primary: #e0e7ff;
        --text-secondary: #a5b4fc;
        --text-muted: #6366f1;
        --border-color: #312e81;
        --accent-color: #c084fc; /* Purple */
        --accent-hover: #a855f7;
        --pattern-color: #312e81;
        --pattern-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
      }

      /* Nature Theme */
      :root.theme-nature {
        --bg-primary: #f0fdf4;
        --bg-secondary: #dcfce7;
        --bg-paper: #ffffff;
        --bg-inset: #f0fdf4;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #14532d;
        --text-secondary: #15803d;
        --text-muted: #86efac;
        --border-color: #bbf7d0;
        --accent-color: #22c55e; /* Green */
        --accent-hover: #16a34a;
        --pattern-color: #dcfce7;
      }

      /* Ocean Theme */
      :root.theme-ocean {
        --bg-primary: #ecfeff;
        --bg-secondary: #cffafe;
        --bg-paper: #ffffff;
        --bg-inset: #ecfeff;
        --panel-bg: rgba(255, 255, 255, 0.95);
        --text-primary: #0e7490;
        --text-secondary: #0891b2;
        --text-muted: #67e8f9;
        --border-color: #a5f3fc;
        --accent-color: #06b6d4; /* Cyan */
        --accent-hover: #0891b2;
        --pattern-color: #cffafe;
      }

      /* Anthracite Variations */
      :root.theme-anthracite-gold { --accent-color: #fbbf24; --accent-hover: #f59e0b; }
      :root.theme-anthracite-cyber { --accent-color: #22d3ee; --accent-hover: #06b6d4; }
      :root.theme-anthracite-bumblebee { --accent-color: #facc15; --accent-hover: #eab308; }
      :root.theme-anthracite-stone { --bg-primary: #1c1917; --bg-paper: #292524; --accent-color: #d6d3d1; --accent-hover: #a8a29e; }
      :root.theme-anthracite-honey { --accent-color: #f59e0b; --accent-hover: #d97706; }
      :root.theme-anthracite-onyx { --bg-primary: #09090b; --bg-paper: #18181b; --accent-color: #e4e4e7; --accent-hover: #d4d4d8; }

      body {
        font-family: var(--ui-font);
        font-size: calc(16px * var(--ui-scale));
        letter-spacing: var(--ui-spacing);
        line-height: var(--ui-line-height);
        background-color: var(--bg-primary);
        background-image: var(--pattern-image);
        background-size: 550px 550px;
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        overflow: hidden; 
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Image Saturation Filter */
      img, svg {
        filter: saturate(var(--ui-saturation));
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-inset); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* Worksheet Texture & Edit Guides (Screen Only) */
      @media screen {
        .worksheet-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 1.4l2.83 2.83 1.41-1.41L1.41 0H0v1.41zM38.59 40l-2.83-2.83 1.41-1.41L40 38.59V40h-1.41zM40 1.41l-2.83 2.83-1.41-1.41L38.59 0H40v1.41zM20 18.6l2.83-2.83 1.41 1.41L21.41 20l2.83 2.83-1.41 1.41L20 21.41l-2.83 2.83-1.41-1.41L18.59 20l-2.83-2.83 1.41-1.41L20 18.59z'/%3E%3C/g%3E%3C/svg%3E");
        }
        
        .edit-grid-overlay {
            background-size: 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            pointer-events: none;
        }

        .print-safety-margin {
            border: 1px dashed rgba(239, 68, 68, 0.3); /* Red-400 equivalent */
            pointer-events: none;
        }
        
        /* Realistic Paper Shadow */
        .realistic-shadow {
            box-shadow: 
                0 1px 1px rgba(0,0,0,0.05), 
                0 2px 2px rgba(0,0,0,0.05), 
                0 4px 4px rgba(0,0,0,0.05), 
                0 8px 8px rgba(0,0,0,0.05),
                0 16px 16px rgba(0,0,0,0.05);
        }
      }

      /* Print Specific Styles - STRICT BLACK & WHITE MODE */
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        
        /* Override Root Variables for Print */
        :root, :root.theme-light, :root.dark, :root[class*="theme-"] {
            --bg-primary: #ffffff !important;
            --bg-paper: #ffffff !important;
            --bg-inset: #ffffff !important;
            --text-primary: #000000 !important;
            --text-secondary: #000000 !important;
            --text-muted: #000000 !important;
            --border-color: #000000 !important;
            --accent-color: #000000 !important;
            --pattern-image: none !important;
        }

        /* Reset Main Containers */
        html, body, #root, main, .h-screen, .overflow-hidden, .flex-1, .printable-area {
          height: auto !important;
          min-height: 0 !important;
          max-height: none !important;
          overflow: visible !important;
          position: static !important;
          display: block !important;
          background-color: white !important;
          background: white !important;
          color: black !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Hide UI Elements */
        .no-print, header, aside, .tour-overlay, .sticky, nav, .fixed, button {
          display: none !important;
        }
        
        /* Hide Edit Mode Helpers */
        .edit-grid-overlay, .print-safety-margin, .edit-handle, .draw-layer {
            display: none !important;
        }

        /* 
           CRITICAL FIX: Reset the Infinite Canvas transformations during print.
           This ensures that mouse wheel zooming (viewZoom) does not affect the print scale.
           The content will print at 100% size relative to the paper.
        */
        .printable-content-parent {
            transform: none !important; /* Removes scale() and translate() applied by mouse interaction */
            width: 100% !important;
            height: auto !important;
            position: static !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
            overflow: visible !important;
        }

        /* Content Styling: Force White BG, Black Text, No Shadows */
        .worksheet-page, .worksheet-item, .printable-content-parent, 
        div, span, p, td, th, li, h1, h2, h3, h4, h5, h6 {
            background-color: transparent !important;
            color: black !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }
        
        /* Background fix for main containers */
        .worksheet-item, .worksheet-page {
             background-color: white !important;
        }

        /* Borders: Force Black */
        *, *::before, *::after {
            border-color: #000000 !important;
        }
        
        /* Ensure inputs/lines are visible */
        input, textarea, hr, .border-b, .border-t, .border-l, .border-r, .border {
             border-color: #000000 !important;
        }

        /* SVG Handling for B&W */
        svg {
            fill: white !important;
            stroke: black !important;
        }
        
        /* Exception for solid shapes inside SVGs (like dots in dominoes) */
        svg circle[fill="black"], svg rect[fill="black"], svg path[fill="black"] {
            fill: black !important;
        }
        
        /* Layout Utilities */
        .break-inside-avoid {
            break-inside: avoid !important;
            page-break-inside: avoid !important;
        }
        
        .page-break {
            break-before: page !important;
            page-break-before: always !important;
        }

        /* Ensure content visibility */
        .printable-content-parent, .worksheet-page {
            visibility: visible !important;
            display: block !important;
        }
        
        /* FORCE DESKTOP-LIKE LAYOUTS IN PRINT */
        .print\:grid-cols-2 {
            display: grid !important;
            grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
        .print\:grid-cols-3 {
            display: grid !important;
            grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        }
        .print\:flex-row {
            display: flex !important;
            flex-direction: row !important;
        }
        .print\:gap-8 {
            gap: 2rem !important;
        }
        .print\:gap-16 {
            gap: 4rem !important;
        }
    }

    /* Custom Scrollbar Utility */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); }
    </style>
